<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width,initial-scale=1">

<title>Account</title>

<style>

body{

margin:0;

padding:20px;

background:

linear-gradient(
rgba(0,0,0,.2),
rgba(0,0,0,.8)
),

url("/lobby-bg.jpg");

background-size:cover;

color:white;

font-family:sans-serif;

}

.box{

margin-top:180px;

padding:28px;

border-radius:28px;

background:

rgba(
0,
0,
0,
.55
);

backdrop-filter:
blur(20px);

text-align:center;

}

.avatar{

font-size:72px;

}

.row{

margin-top:18px;

color:gold;

font-size:18px;

}

.logout{

margin-top:30px;

width:100%;

height:60px;

border:none;

border-radius:18px;

background:red;

color:white;

font-size:20px;

}

</style>

</head>

<body>

<div class="box">

<div class="avatar">
👤
</div>

<div class="row" id="name">
名字
</div>

<div class="row" id="uid">
UID
</div>

<div class="row" id="balance">
余额
</div>

<div class="row" id="point">
Point
</div>

<div class="row" id="vip">
VIP
</div>

<div class="row" id="topup">
累计充值
</div>

<button
class="logout"
onclick="logout()">

退出登录

</button>

</div>

<script>

async function load(){

const uid =
localStorage.getItem(
"userId"
);

if(!uid){

location.href =
"/login.html";

return;

}

const res =
await fetch(
"/balance/"+uid
);

const d =
await res.json();

document
.getElementById(
"name"
).innerText =
"👤 "
+
(
d.name
||
uid
);

document
.getElementById(
"uid"
).innerText =
"🆔 "
+
uid;

document
.getElementById(
"balance"
).innerText =
"💰 "
+
(
d.balance||0
);

document
.getElementById(
"point"
).innerText =
"💎 "
+
(
d.point||0
);

document
.getElementById(
"vip"
).innerText =
"👑 VIP "
+
(
d.vip_level||10
);

document
.getElementById(
"topup"
).innerText =
"🏦 "
+
(
d.total_topup||0
);

}

function logout(){

localStorage.clear();

location.href=
"/login.html";

}

load();

</script>

</body>

</html>
