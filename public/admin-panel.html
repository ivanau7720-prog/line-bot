body{
  background: radial-gradient(circle at center, #0b3d2e, #000);
  color: white;

  padding:20px;
}

/* 卡片 */
.card{
  background: rgba(0,0,0,0.6);
  border:1px solid gold;
  border-radius:12px;
  padding:15px;
  margin-bottom:20px;
  box-shadow:0 0 15px rgba(255,215,0,0.3);
}

/* 按钮 */
button{
  padding:10px 15px;
  border:none;
  border-radius:8px;
  background: linear-gradient(45deg,#ffcc00,#ff9900);
  color:black;
  font-weight:bold;
  cursor:pointer;
  margin:5px;
  transition:
all .25s ease;
}

button:hover{
  transform:scale(1.1);
  box-shadow:0 0 15px gold;
}
.blinkAlert{
  animation: blinkAlert 1s infinite;
}

@keyframes blinkAlert{
  0%{
    box-shadow:0 0 5px red;
  }
  50%{
    box-shadow:0 0 25px red;
    transform:scale(1.05);
  }
  100%{
    box-shadow:0 0 5px red;
  }
}
/* 标题 */
h2,h3{
  color: gold;
}

/* 列表 */
#players div,
#rounds div,
#tx div,
#betList div{
  padding:6px;
  border-bottom:1px solid rgba(255,255,255,0.1);
}

const adminToken = localStorage.getItem("adminToken");

if(!adminToken){
  location.href = "/admin-login.html";
}

function adminHeaders(){
  return {
    "Content-Type":"application/json",
    "x-admin-token": adminToken
  };
}

function adminGetHeaders(){
  return {
    "x-admin-token": adminToken
  };
}  
function logoutAdmin(){
  localStorage.removeItem("adminToken");
  location.href = "/admin-login.html";
}  
async function createAgent(){
  const agentCode = document.getElementById("agentCode").value;
  const agentName = document.getElementById("agentName").value;

 await fetch("/admin/create-agent",{
  method:"POST",
  headers: adminHeaders(),
  body: JSON.stringify({agentCode, agentName})
});

  alert("代理已新增");
  loadAgents();
}

async function loadAgents(){
  const lang = localStorage.getItem("adminLang") || "zh";
const t = LANG[lang];
  const res = await fetch("/admin/agents",{
  headers: adminGetHeaders()
});
  const data = await res.json();

  let html = "";

  if(data.length === 0){
    html = t.agentEmpty;
  }

  data.forEach(a=>{
    html += `
      <div style="padding:8px;border-bottom:1px solid rgba(255,255,255,0.15)">
        🤝 ${a.agent_code} ｜ ${a.agent_name}
        <br>
        ${t.playerCount}${a.player_count}
<br>
${t.totalTurnover}${a.total_turnover}
      </div>
    `;
  });

  document.getElementById("agents").innerHTML = html;
}

  const lang = localStorage.getItem("adminLang") || "zh";
const t = LANG[lang];

  html += `

    🆔 ${p.id}
    | 👤 ${p.username}

async function loadBets(){
const lang = localStorage.getItem("adminLang") || "zh";
const t = LANG[lang];
  const res = await fetch("/admin/bets",{
  headers: adminGetHeaders()
});
  const data = await res.json();

  let html = "";

let totalB = 0;
let totalP = 0;
let totalT = 0;

let payB = 0;
let payP = 0;
let payT = 0;

let profitB = 0;
let profitP = 0;
let profitT = 0;  

  if(data.length === 0){

   html = t.betEmpty;

  }else{

    data.forEach(b=>{

      let side = "";
     if(b.side === "B"){
side = t.banker;
totalB += Number(b.amount);
payB += Number(b.amount) * 1.95;
}

if(b.side === "P"){
side = t.player;
totalP += Number(b.amount);
payP += Number(b.amount) * 2;
}

if(b.side === "T"){
side = t.tie;
totalT += Number(b.amount);
payT += Number(b.amount) * 9;
}

      html += `
        <div style="padding:6px;border-bottom:1px solid rgba(255,255,255,0.1)">
          ${b.name} ｜ ${side} ｜ 💰${b.amount}
        </div>
      `;

    });
profitB = (totalP + totalT) - payB;
profitP = (totalB + totalT) - payP;
profitT = (totalB + totalP) - payT;
  }

html += `
<div style="
margin-top:10px;
padding-top:10px;
border-top:1px solid gold;
font-weight:bold;
color:gold;
">

<div>${t.bankerTotal}${totalB}</div>
<div>${t.playerTotal}${totalP}</div>
<div>${t.tieTotal}${totalT}</div>

<div style="margin-top:8px;color:#ffcc00;">
${t.payBanker}${payB}
</div>

<div style="color:#ffcc00;">
${t.payPlayer}${payP}
</div>

<div style="color:#ffcc00;">
${t.payTie}${payT}
</div>

<div style="margin-top:8px;color:#00ff99;">
${t.profitBanker}${profitB}
</div>

<div style="color:#00ff99;">
${t.profitPlayer}${profitP}
</div>

<div style="color:#00ff99;">
${t.profitTie}${profitT}
</div>

</div>
`;

let warning = "";

let maxProfit = Math.max(profitB, profitP, profitT);

if(maxProfit === profitB){

warning = `
<div style="color:#00ff99;margin-top:10px;font-weight:bold;">
${t.suggestBanker}
</div>
`;

}

else if(maxProfit === profitP){

warning = `
<div style="color:#00ff99;margin-top:10px;font-weight:bold;">
${t.suggestPlayer}
</div>
`;

}

else{

warning = `
<div style="color:#00ff99;margin-top:10px;font-weight:bold;">
${t.suggestTie}
</div>
`;

}

html += warning;
document.getElementById("betList").innerHTML = html;
}
