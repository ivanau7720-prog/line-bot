<!DOCTYPE html>

<style>

body{
  background: radial-gradient(circle at center, #0b3d2e, #000);
  color: white;
  font-family: sans-serif;
  padding:20px;
}

/* 卡片 */
.card{
  background: rgba(0,0,0,0.6);
  border:1px solid gold;
  border-radius:12px;
  padding:15px;
  margin-bottom:20px;
  box-shadow:0 0 15px rgba(255,215,0,0.3);
}

/* 按钮 */
button{
  padding:10px 15px;
  border:none;
  border-radius:8px;
  background: linear-gradient(45deg,#ffcc00,#ff9900);
  color:black;
  font-weight:bold;
  cursor:pointer;
  margin:5px;
  transition:0.3s;
}

button:hover{
  transform:scale(1.1);
  box-shadow:0 0 15px gold;
}

/* 标题 */
h2,h3{
  color: gold;
}

/* 列表 */
#players div,
#rounds div,
#tx div,
#betList div{
  padding:6px;
  border-bottom:1px solid rgba(255,255,255,0.1);
}

</style>

const adminToken = localStorage.getItem("adminToken");

if(!adminToken){
  location.href = "/admin-login.html";
}

function adminHeaders(){
  return {
    "Content-Type":"application/json",
    "x-admin-token": adminToken
  };
}

function adminGetHeaders(){
  return {
    "x-admin-token": adminToken
  };
}  
function logoutAdmin(){
  localStorage.removeItem("adminToken");
  location.href = "/admin-login.html";
}  
async function createAgent(){
  const agentCode = document.getElementById("agentCode").value;
  const agentName = document.getElementById("agentName").value;

 await fetch("/admin/create-agent",{
  method:"POST",
  headers: adminHeaders(),
  body: JSON.stringify({agentCode, agentName})
});

  alert("代理已新增");
  loadAgents();
}

async function loadAgents(){
  const lang = localStorage.getItem("adminLang") || "zh";
const t = LANG[lang];
  const res = await fetch("/admin/agents",{
  headers: adminGetHeaders()
});
  const data = await res.json();

  let html = "";

  if(data.length === 0){
    html = t.agentEmpty;
  }

  data.forEach(a=>{
    html += `
      <div style="padding:8px;border-bottom:1px solid rgba(255,255,255,0.15)">
        🤝 ${a.agent_code} ｜ ${a.agent_name}
        <br>
        ${t.playerCount}${a.player_count}
<br>
${t.totalTurnover}${a.total_turnover}
      </div>
    `;
  });

  document.getElementById("agents").innerHTML = html;
}
  
async function loadPlayers(){
  const lang = localStorage.getItem("adminLang") || "zh";
const t = LANG[lang];
  const res = await fetch("/admin/players",{
  headers: adminGetHeaders()
});
  const data = await res.json();

  let html = "";

  data.forEach(p=>{
  html += `
  <div style="margin:5px 0">
    🆔 ${p.id}
    | 👤 ${p.username}
    | ${t.agentLabel}${p.agent_code}
    | 💰${p.balance}
    | ${t.winLabel}${p.win}
    | ${t.loseLabel}${p.lose}
  </div>
`;
  });

  document.getElementById("players").innerHTML = html;
}

  await fetch("/start",{method:"POST"});
}

  await fetch("/stop",{method:"POST"});
}

async function setResult(){
  const result = document.getElementById("resultInput").value;

 await fetch("/result",{

});
}

async function add(){
  const userId = document.getElementById("uid").value;
  const amount = Number(document.getElementById("amt").value);

 await fetch("/admin/add",{
  method:"POST",
  headers: adminHeaders(),
  body: JSON.stringify({userId,amount})
});
}

async function minus(){
  const userId = document.getElementById("uid").value;
  const amount = Number(document.getElementById("amt").value);

 await fetch("/admin/minus",{
  method:"POST",
  headers: adminHeaders(),
  body: JSON.stringify({userId,amount})
});
}
async function loadRounds(){
  const lang = localStorage.getItem("adminLang") || "zh";
const t = LANG[lang];
  const res = await fetch("/admin/rounds",{
  headers: adminGetHeaders()
});
  const data = await res.json();

  let html = "";

  data.forEach(r=>{
   let result = r.result;

if(result === "B") result = t.banker;
if(result === "P") result = t.player;
if(result === "T") result = t.tie;

html += `<div>🎯 ${t.roundLabel}${r.id}${t.roundUnit} ｜ ${result}</div>`;
  });

  document.getElementById("rounds").innerHTML = html;
}

async function loadTx(){
  const lang =
localStorage.getItem("adminLang")
|| "zh";

const t =
LANG[lang];
  const userId = document.getElementById("filterUserId").value.trim();
  const agentCode = document.getElementById("filterAgentCode").value.trim();
  const date = document.getElementById("filterDate").value;

  let url = "/admin/transactions?";
  if(userId) url += "userId=" + encodeURIComponent(userId) + "&";
  if(agentCode) url += "agentCode=" + encodeURIComponent(agentCode) + "&";
  if(date) url += "date=" + encodeURIComponent(date) + "&";

  const res = await fetch(url,{
  headers: adminGetHeaders()
});
  const data = await res.json();

  let html = "";

  if(data.length === 0){
   html = t.txEmpty;
  }

 data.forEach(tx=>{

let side = tx.bet_side;

if(side === "B") side = t.banker;
if(side === "P") side = t.player;
if(side === "T") side = t.tie;

html += `
<div style="padding:8px;border-bottom:1px solid rgba(255,255,255,0.15)">

👤 ${tx.username}

<br>

🆔 ${tx.user_id}

<br>

${t.agentTx}${tx.agent_code}

<br>

${t.betTx}${side}

<br>

${t.amountTx}${tx.amount}

<br>

${t.typeTx}${tx.type}

<br>

${t.resultTx}${tx.result}

<br>

${t.winTx}${tx.win_amount}

<br>

🕒 ${tx.created_at}

</div>
`;

});

  document.getElementById("tx").innerHTML = html;
}
async function loadReviewBadges(){
  const rechargeRes = await fetch("/admin/recharge-requests",{
    headers: adminGetHeaders()
  });

  const rechargeData = await rechargeRes.json();

  const withdrawRes = await fetch("/admin/withdraw-requests",{
    headers: adminGetHeaders()
  });

  const withdrawData = await withdrawRes.json();

  const rechargePending = rechargeData.filter(r => r.status === "pending").length;
  const withdrawPending = withdrawData.filter(w => w.status === "pending").length;

  const rechargeBadge = document.getElementById("rechargeBadge");
  const withdrawBadge = document.getElementById("withdrawBadge");

  rechargeBadge.innerText = rechargePending;
  withdrawBadge.innerText = withdrawPending;

  rechargeBadge.style.display = rechargePending > 0 ? "inline-block" : "none";
  withdrawBadge.style.display = withdrawPending > 0 ? "inline-block" : "none";
}
function clearTxFilter(){
  document.getElementById("filterUserId").value = "";
  document.getElementById("filterAgentCode").value = "";
  document.getElementById("filterDate").value = "";
  loadTx();
}

async function loadBets(){
const lang = localStorage.getItem("adminLang") || "zh";
const t = LANG[lang];
  const res = await fetch("/admin/bets",{
  headers: adminGetHeaders()
});
  const data = await res.json();

  let html = "";

let totalB = 0;
let totalP = 0;
let totalT = 0;

let payB = 0;
let payP = 0;
let payT = 0;

let profitB = 0;
let profitP = 0;
let profitT = 0;  

  if(data.length === 0){

   html = t.betEmpty;

  }else{

    data.forEach(b=>{

      let side = "";
     if(b.side === "B"){
side = t.banker;
totalB += Number(b.amount);
payB += Number(b.amount) * 1.95;
}

if(b.side === "P"){
side = t.player;
totalP += Number(b.amount);
payP += Number(b.amount) * 2;
}

if(b.side === "T"){
side = t.tie;
totalT += Number(b.amount);
payT += Number(b.amount) * 8;
}

      html += `
        <div style="padding:6px;border-bottom:1px solid rgba(255,255,255,0.1)">
          ${b.name} ｜ ${side} ｜ 💰${b.amount}
        </div>
      `;

    });
profitB = (totalP + totalT) - payB;
profitP = (totalB + totalT) - payP;
profitT = (totalB + totalP) - payT;
  }

html += `
<div style="
margin-top:10px;
padding-top:10px;
border-top:1px solid gold;
font-weight:bold;
color:gold;
">

<div>${t.bankerTotal}${totalB}</div>
<div>${t.playerTotal}${totalP}</div>
<div>${t.tieTotal}${totalT}</div>

<div style="margin-top:8px;color:#ffcc00;">
${t.payBanker}${payB}
</div>

<div style="color:#ffcc00;">
${t.payPlayer}${payP}
</div>

<div style="color:#ffcc00;">
${t.payTie}${payT}
</div>

<div style="margin-top:8px;color:#00ff99;">
${t.profitBanker}${profitB}
</div>

<div style="color:#00ff99;">
${t.profitPlayer}${profitP}
</div>

<div style="color:#00ff99;">
${t.profitTie}${profitT}
</div>

</div>
`;

let warning = "";

let maxProfit = Math.max(profitB, profitP, profitT);

if(maxProfit === profitB){

warning = `
<div style="color:#00ff99;margin-top:10px;font-weight:bold;">
${t.suggestBanker}
</div>
`;

}

else if(maxProfit === profitP){

warning = `
<div style="color:#00ff99;margin-top:10px;font-weight:bold;">
${t.suggestPlayer}
</div>
`;

}

else{

warning = `
<div style="color:#00ff99;margin-top:10px;font-weight:bold;">
${t.suggestTie}
</div>
`;

}

html += warning;
document.getElementById("betList").innerHTML = html;
}
