<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">

<style>

body{
  background: radial-gradient(circle at center, #0b3d2e, #000);
  color: white;
  font-family: sans-serif;
  padding:20px;
}

/* 卡片 */
.card{
  background: rgba(0,0,0,0.6);
  border:1px solid gold;
  border-radius:12px;
  padding:15px;
  margin-bottom:20px;
  box-shadow:0 0 15px rgba(255,215,0,0.3);
}

/* 按钮 */
button{
  padding:10px 15px;
  border:none;
  border-radius:8px;
  background: linear-gradient(45deg,#ffcc00,#ff9900);
  color:black;
  font-weight:bold;
  cursor:pointer;
  margin:5px;
  transition:0.3s;
}

button:hover{
  transform:scale(1.1);
  box-shadow:0 0 15px gold;
}

/* 标题 */
h2,h3{
  color: gold;
}

/* 列表 */
#players div,
#rounds div,
#tx div,
#betList div{
  padding:6px;
  border-bottom:1px solid rgba(255,255,255,0.1);
}

</style>

</head>

<body>

<h2>🎮 管理员面板</h2>

<button onclick="logoutAdmin()">🚪 退出登录</button>
<div class="card">
  <h3>📊 盈利统计</h3>
  <div id="profitToday">今日盈利：--</div>
  <div id="profitTotal">总盈利：--</div>
</div>
  
<div class="card">
  <h3>🎰 游戏控制</h3>

  <button onclick="startGame()">▶ 开始下注</button>
  <button onclick="stopGame()">⛔ 停止下注</button>

  <br><br>

  <input id="resultInput" placeholder="输入 B / P / T">

  <button onclick="setResult()">🏁 开奖</button>
</div>

<!-- 👇👇👇 新增这里 -->
<div class="card">
  <h3>📋 当前下注记录</h3>
  <div id="betList">暂无下注</div>
</div>

<div class="card">
<h3>💰 玩家资金</h3>

<input id="uid" placeholder="玩家ID">
<input id="amt" placeholder="金额">

<button onclick="add()">➕ 加钱</button>
<button onclick="minus()">➖ 扣钱</button>
</div>

<div class="card">
  <h3>🤝 代理管理</h3>

  <input id="agentCode" placeholder="代理编号，例如 AG001">
  <input id="agentName" placeholder="代理名字">

  <button onclick="createAgent()">➕ 新增代理</button>

  <h3>📊 代理流水</h3>
  <div id="agents">暂无代理资料</div>
</div>
  
<!-- 👇👇👇 这里是你新加的 -->
<div class="card">
  <h3>👥 玩家列表</h3>
  <div id="players"></div>
</div>

 <div class="card">
 <h3>📜 游戏记录</h3>
 <div id="rounds"></div>
  </div>

<div class="card">
  <h3>📜 玩家流水记录</h3>

  <input id="filterUserId" placeholder="玩家ID">
  <input id="filterAgentCode" placeholder="代理编号，例如 AG001">
  <input id="filterDate" type="date">

  <button onclick="loadTx()">🔍 搜索</button>
  <button onclick="clearTxFilter()">❌ 清除</button>

  <br><br>

  <div id="tx"></div>
</div>

<script>

const adminToken = localStorage.getItem("adminToken");

if(!adminToken){
  location.href = "/admin-login.html";
}

function adminHeaders(){
  return {
    "Content-Type":"application/json",
    "x-admin-token": adminToken
  };
}

function adminGetHeaders(){
  return {
    "x-admin-token": adminToken
  };
}  
function logoutAdmin(){
  localStorage.removeItem("adminToken");
  location.href = "/admin-login.html";
}  
async function createAgent(){
  const agentCode = document.getElementById("agentCode").value;
  const agentName = document.getElementById("agentName").value;

 await fetch("/admin/create-agent",{
  method:"POST",
  headers: adminHeaders(),
  body: JSON.stringify({agentCode, agentName})
});

  alert("代理已新增");
  loadAgents();
}

async function loadAgents(){
  const res = await fetch("/admin/agents",{
  headers: adminGetHeaders()
});
  const data = await res.json();

  let html = "";

  if(data.length === 0){
    html = "暂无代理资料";
  }

  data.forEach(a=>{
    html += `
      <div style="padding:8px;border-bottom:1px solid rgba(255,255,255,0.15)">
        🤝 ${a.agent_code} ｜ ${a.agent_name}
        <br>
        👥 玩家数：${a.player_count}
        <br>
        💧 总流水：${a.total_turnover}
      </div>
    `;
  });

  document.getElementById("agents").innerHTML = html;
}
  
async function loadPlayers(){
  const res = await fetch("/admin/players",{
  headers: adminGetHeaders()
});
  const data = await res.json();

  let html = "";

  data.forEach(p=>{
   html += `
  <div style="margin:5px 0">
    🆔 ${p.id}
    | 👤 ${p.username}
    | 🤝代理:${p.agent_code}
    | 💰${p.balance}
    | 赢:${p.win}
    | 输:${p.lose}
  </div>
`;
  });

  document.getElementById("players").innerHTML = html;
}
  
async function startGame(){
  await fetch("/start",{method:"POST"});
}

async function stopGame(){
  await fetch("/stop",{method:"POST"});
}

async function setResult(){
  const result = document.getElementById("resultInput").value;

 await fetch("/result",{
  method:"POST",
  headers:{"Content-Type":"application/json"},
  body: JSON.stringify({result})
});
}

async function add(){
  const userId = document.getElementById("uid").value;
  const amount = Number(document.getElementById("amt").value);

 await fetch("/admin/add",{
  method:"POST",
  headers: adminHeaders(),
  body: JSON.stringify({userId,amount})
});
}

async function minus(){
  const userId = document.getElementById("uid").value;
  const amount = Number(document.getElementById("amt").value);

 await fetch("/admin/minus",{
  method:"POST",
  headers: adminHeaders(),
  body: JSON.stringify({userId,amount})
});
}
async function loadRounds(){
  const res = await fetch("/admin/rounds",{
  headers: adminGetHeaders()
});
  const data = await res.json();

  let html = "";

  data.forEach(r=>{
   let result = r.result;

if(result === "B") result = "庄";
if(result === "P") result = "闲";
if(result === "T") result = "和";

html += `<div>🎯 第${r.id}局 ｜ ${result}</div>`;
  });

  document.getElementById("rounds").innerHTML = html;
}

async function loadTx(){
  const userId = document.getElementById("filterUserId").value.trim();
  const agentCode = document.getElementById("filterAgentCode").value.trim();
  const date = document.getElementById("filterDate").value;

  let url = "/admin/transactions?";
  if(userId) url += "userId=" + encodeURIComponent(userId) + "&";
  if(agentCode) url += "agentCode=" + encodeURIComponent(agentCode) + "&";
  if(date) url += "date=" + encodeURIComponent(date) + "&";

  const res = await fetch(url,{
  headers: adminGetHeaders()
});
  const data = await res.json();

  let html = "";

  if(data.length === 0){
    html = "没有找到流水记录";
  }

  data.forEach(t=>{
    let side = t.bet_side;

    if(side === "B") side = "庄";
    if(side === "P") side = "闲";
    if(side === "T") side = "和";

    html += `
      <div style="padding:8px;border-bottom:1px solid rgba(255,255,255,0.15)">
        👤 ${t.username}
        <br>
        🆔 ${t.user_id}
        <br>
        🤝 代理：${t.agent_code}
        <br>
        🎯 下注：${side}
        <br>
        💰 金额：${t.amount}
        <br>
        📈 类型：${t.type}
        <br>
        🏁 结果：${t.result}
        <br>
        💵 赢取：${t.win_amount}
        <br>
        🕒 ${t.created_at}
      </div>
    `;
  });

  document.getElementById("tx").innerHTML = html;
}

function clearTxFilter(){
  document.getElementById("filterUserId").value = "";
  document.getElementById("filterAgentCode").value = "";
  document.getElementById("filterDate").value = "";
  loadTx();
}
  
async function loadProfit(){
  const res = await fetch("/admin/profit",{
  headers: adminGetHeaders()
});
  const data = await res.json();

  document.getElementById("profitToday").innerText =
    "今日盈利：" + data.today;

  document.getElementById("profitTotal").innerText =
    "总盈利：" + data.total;
}
async function loadBets(){

  const res = await fetch("/admin/bets",{
  headers: adminGetHeaders()
});
  const data = await res.json();

  let html = "";

let totalB = 0;
let totalP = 0;
let totalT = 0;

let payB = 0;
let payP = 0;
let payT = 0;

let profitB = 0;
let profitP = 0;
let profitT = 0;  

  if(data.length === 0){

    html = "暂无下注";

  }else{

    data.forEach(b=>{

      let side = "";
     if(b.side === "B"){
side = "庄";
totalB += Number(b.amount);
payB += Number(b.amount) * 1.95;
}

if(b.side === "P"){
side = "闲";
totalP += Number(b.amount);
payP += Number(b.amount) * 2;
}

if(b.side === "T"){
side = "和";
totalT += Number(b.amount);
payT += Number(b.amount) * 8;
}

      html += `
        <div style="padding:6px;border-bottom:1px solid rgba(255,255,255,0.1)">
          ${b.name} ｜ ${side} ｜ 💰${b.amount}
        </div>
      `;

    });
profitB = (totalP + totalT) - payB;
profitP = (totalB + totalT) - payP;
profitT = (totalB + totalP) - payT;
  }

html += `
<div style="
margin-top:10px;
padding-top:10px;
border-top:1px solid gold;
font-weight:bold;
color:gold;
">

<div>🔴 庄总额：${totalB}</div>
<div>🔵 闲总额：${totalP}</div>
<div>🟢 和总额：${totalT}</div>

<div style="margin-top:8px;color:#ffcc00;">
💸 若开庄赔付：${payB}
</div>

<div style="color:#ffcc00;">
💸 若开闲赔付：${payP}
</div>

<div style="color:#ffcc00;">
💸 若开和赔付：${payT}
</div>

<div style="margin-top:8px;color:#00ff99;">
💵 若开庄净赚：${profitB}
</div>

<div style="color:#00ff99;">
💵 若开闲净赚：${profitP}
</div>

<div style="color:#00ff99;">
💵 若开和净赚：${profitT}
</div>

</div>
`;

let warning = "";

let maxProfit = Math.max(profitB, profitP, profitT);

if(maxProfit === profitB){

warning = `
<div style="color:#00ff99;margin-top:10px;font-weight:bold;">
🔥 建议开庄（赚最多）
</div>
`;

}

else if(maxProfit === profitP){

warning = `
<div style="color:#00ff99;margin-top:10px;font-weight:bold;">
🔥 建议开闲（赚最多）
</div>
`;

}

else{

warning = `
<div style="color:#00ff99;margin-top:10px;font-weight:bold;">
🔥 建议开和（赚最多）
</div>
`;

}

html += warning;
document.getElementById("betList").innerHTML = html;
}
  
setInterval(()=>{
  loadPlayers();
  loadRounds();
  loadTx();
  loadProfit();
  loadBets();
  loadAgents();
},2000);
  loadBets();
loadAgents();
  loadTx();
loadPlayers();
loadProfit();
loadRounds();
</script>

</body>
</html>
