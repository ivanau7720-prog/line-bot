<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Exchange Records</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
min-height:100vh;
font-family:sans-serif;
color:white;
padding:24px 16px 50px;
background:
linear-gradient(rgba(0,5,20,.3),rgba(0,0,0,.9)),
url("/shop-bg.jpg");
background-size:cover;
background-position:center;
}
.langBox{
position:fixed;
top:18px;
right:18px;
z-index:10;
}

.langBox button{
background:rgba(0,0,0,.55);
color:gold;
border:1px solid rgba(255,215,0,.45);
border-radius:18px;
padding:8px 12px;
margin-left:6px;
}
  
.title{
margin-top:80px;
text-align:center;
font-size:26px;
font-weight:bold;
color:gold;
text-shadow:0 0 16px gold;
}

.sub{
text-align:center;
margin-top:8px;
color:#cfd9ff;
font-size:14px;
}

.list{
margin-top:28px;
}

.card{
margin-bottom:14px;
padding:18px;
border-radius:20px;
background:rgba(0,18,45,.72);
border:1px solid rgba(0,180,255,.35);
box-shadow:0 0 20px rgba(0,180,255,.15);
backdrop-filter:blur(14px);
}

.name{
font-size:18px;
font-weight:bold;
color:white;
}

.point{
margin-top:8px;
font-size:16px;
color:gold;
font-weight:bold;
}

.status{
margin-top:10px;
font-size:14px;
color:#9fb3ff;
}

.date{
margin-top:8px;
font-size:12px;
color:#8fa0c8;
}

.empty{
margin-top:80px;
text-align:center;
color:#cfd9ff;
}

.backBtn{
width:100%;
height:52px;
margin-top:26px;
border:none;
border-radius:18px;
background:linear-gradient(90deg,#ffd700,#ffb300);
color:black;
font-size:17px;
font-weight:bold;
}
</style>
</head>

<body>

<div class="langBox">
<button onclick="switchLang('zh')">中文</button>
<button onclick="switchLang('th')">ไทย</button>
</div>

<div class="title" id="pageTitle">兑换记录</div>
<div class="sub" id="pageSub">Exchange Records</div>

<div class="list" id="list"></div>

<button class="backBtn" onclick="location.href='/account.html'" id="backText">
← 返回账户
</button>

<script>

const LANG={
zh:{
pageTitle:"兑换记录",
pageSub:"Exchange Records",
back:"← 返回账户",
empty:"暂无兑换记录"
},
th:{
pageTitle:"ประวัติแลกของรางวัล",
pageSub:"Exchange Records",
back:"← กลับบัญชี",
empty:"ยังไม่มีประวัติแลกของรางวัล"
}
};

function switchLang(lang){
localStorage.setItem("homeLang",lang);

const t=LANG[lang];

document.getElementById("pageTitle").innerText=t.pageTitle;
document.getElementById("pageSub").innerText=t.pageSub;
document.getElementById("backText").innerText=t.back;

loadRecords();
}

async function loadRecords(){
const lang =
localStorage.getItem("homeLang")
|| "zh";

const t =
LANG[lang];
const uid=localStorage.getItem("userId");

if(!uid){
location.href="/login.html";
return;
}

const res=await fetch("/my-exchange-records/"+uid);
const data=await res.json();

const list=document.getElementById("list");

if(!data || data.length===0){
list.innerHTML=`
<div class="empty">
${t.empty}
</div>
`;
return;
}

list.innerHTML="";

data.forEach(r=>{

let statusText = "";
let statusColor = "#ffcc00";

if(r.status==="pending"){
statusText = lang==="th" ? "รอตรวจสอบ" : "审核中";
statusColor = "#ffcc00";
}

if(r.status==="approved"){
statusText = lang==="th" ? "อนุมัติแล้ว" : "已批准";
statusColor = "#00ff99";
}

if(r.status==="rejected"){
statusText = lang==="th" ? "ปฏิเสธ / คืน Point แล้ว" : "已拒绝 / Point已退回";
statusColor = "#ff4444";
}

if(r.status==="done"){
statusText = lang==="th" ? "จัดส่งแล้ว" : "已发货";
statusColor = "gold";
}

const card=document.createElement("div");
card.className="card";

card.innerHTML=`
<div class="name">
${r.item_name || "-"}
</div>

<div class="point">
-${Number(r.point_cost || 0).toLocaleString()} Point
</div>

<div
class="status"
style="
color:${statusColor};
font-size:16px;
font-weight:bold;
">

${lang==="th"
?
"สถานะ："
:
"状态："
}

${statusText}

</div>

${
r.shipping_note

?

`

<div style="
margin-top:8px;
padding:10px;
border-radius:12px;
background:rgba(255,215,0,.12);
color:gold;
font-size:14px;
">

📦
${lang==="th"
?
"หมายเหตุการจัดส่ง"
:
"发货备注"}

：

${r.shipping_note}

</div>

`

:

""

}

<div class="date">

${new Date(
r.created_at
).toLocaleString()}

</div>
`;

list.appendChild(card);

});

}

switchLang(localStorage.getItem("homeLang") || "zh");
</script>

</body>
</html>
