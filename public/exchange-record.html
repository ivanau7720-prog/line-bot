<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Exchange Records</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
min-height:100vh;
font-family:sans-serif;
color:white;
padding:24px 16px 50px;
background:
linear-gradient(rgba(0,5,20,.3),rgba(0,0,0,.9)),
url("/shop-bg.jpg");
background-size:cover;
background-position:center;
}

.title{
margin-top:80px;
text-align:center;
font-size:26px;
font-weight:bold;
color:gold;
text-shadow:0 0 16px gold;
}

.sub{
text-align:center;
margin-top:8px;
color:#cfd9ff;
font-size:14px;
}

.list{
margin-top:28px;
}

.card{
margin-bottom:14px;
padding:18px;
border-radius:20px;
background:rgba(0,18,45,.72);
border:1px solid rgba(0,180,255,.35);
box-shadow:0 0 20px rgba(0,180,255,.15);
backdrop-filter:blur(14px);
}

.name{
font-size:18px;
font-weight:bold;
color:white;
}

.point{
margin-top:8px;
font-size:16px;
color:gold;
font-weight:bold;
}

.status{
margin-top:10px;
font-size:14px;
color:#9fb3ff;
}

.date{
margin-top:8px;
font-size:12px;
color:#8fa0c8;
}

.empty{
margin-top:80px;
text-align:center;
color:#cfd9ff;
}

.backBtn{
width:100%;
height:52px;
margin-top:26px;
border:none;
border-radius:18px;
background:linear-gradient(90deg,#ffd700,#ffb300);
color:black;
font-size:17px;
font-weight:bold;
}
</style>
</head>

<body>

<div class="title">兑换记录</div>
<div class="sub">Exchange Records</div>

<div class="list" id="list"></div>

<button class="backBtn" onclick="location.href='/account.html'">
返回账户
</button>

<script>
async function loadRecords(){

const uid=localStorage.getItem("userId");

if(!uid){
location.href="/login.html";
return;
}

const res=await fetch("/my-exchange-records/"+uid);
const data=await res.json();

const list=document.getElementById("list");

if(!data || data.length===0){
list.innerHTML=`
<div class="empty">
暂无兑换记录
</div>
`;
return;
}

list.innerHTML="";

data.forEach(r=>{

let statusText="审核中";

if(r.status==="approved"){
statusText="已批准";
}

if(r.status==="rejected"){
statusText="已拒绝";
}

if(r.status==="done"){
statusText="已完成";
}

const card=document.createElement("div");
card.className="card";

card.innerHTML=`
<div class="name">${r.item_name || "-"}</div>
<div class="point">-${Number(r.point_cost || 0).toLocaleString()} Point</div>
<div class="status">状态：${statusText}</div>
<div class="date">${new Date(r.created_at).toLocaleString()}</div>
`;

list.appendChild(card);

});

}

loadRecords();
</script>

</body>
</html>
