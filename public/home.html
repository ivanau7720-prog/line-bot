<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">

<title>SIAMBET88</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{

height:100vh;

overflow:auto;

font-family:sans-serif;

background:

linear-gradient(
rgba(0,0,0,.20),
rgba(0,0,0,.70)
),

url("/lobby-bg.jpg");

background-size:cover;

background-position:center top;

color:white;

}

.wrap{

padding:

40px
20px
160px;

}

.logo-spacer{
height:260px;
}

.langBox{
position:fixed;
top:18px;
right:18px;
z-index:10;
}

.langBox button{
background:rgba(0,0,0,.55);
color:gold;
border:1px solid rgba(255,215,0,.5);
border-radius:18px;
padding:8px 12px;
margin-left:6px;
}
  
.grid{

display:grid;

grid-template-columns:
1fr
1fr;

gap:18px;

}

.card{

height:130px;

border-radius:30px;

background:

linear-gradient(
180deg,
rgba(20,20,20,.82),
rgba(0,0,0,.62)
);

backdrop-filter:
blur(20px);

border:

1px solid
rgba(255,215,0,.30);

display:flex;

flex-direction:column;

justify-content:center;

align-items:center;

text-decoration:none;

color:white;

box-shadow:

0 0 40px rgba(
255,
180,
0,
.12
);

transition:.35s;

}

.card:hover{

transform:
translateY(-6px);

border:

1px solid gold;

box-shadow:

0 0 60px gold;

}

.icon{

font-size:34px;

margin-bottom:10px;

filter:

drop-shadow(
0 0 10px gold
);

}

.text{

font-size:24px;

color:gold;

}

.sub{

margin-top:8px;

color:#ddd;

}

.bottom{

position:fixed;

bottom:18px;

left:14px;

right:14px;

padding:16px;

background:

rgba(
0,
0,
0,
.55
);

backdrop-filter:
blur(18px);

border:

1px solid
rgba(
255,
215,
0,
.35
);

border-radius:24px;

display:flex;

justify-content:
space-around;

box-shadow:

0 0 35px
rgba(
255,
215,
0,
.20
);

}

.info{

text-align:center;

min-width:90px;

}

.value{

color:gold;

font-size:22px;

font-weight:bold;

text-shadow:

0 0 15px gold;

margin-top:8px;

}

</style>

</head>

<body>
  
<div class="langBox">
  <button onclick="switchLang('zh')">中文</button>
  <button onclick="switchLang('th')">ไทย</button>
</div>
  
<div class="wrap">

<div class="logo-spacer"></div>

<div class="grid">

<a class="card" href="/index.html">

<div class="icon">
🎮
</div>

<div class="text" id="gameText">
百家乐
</div>

<div class="sub">
BACCARAT
</div>

</a>

<a class="card" href="/shop.html">

<div class="icon">
🎁
</div>

<div class="text" id="shopText">
积分商城
</div>

</a>

<a class="card" href="/wallet.html">

<div class="icon">
💰
</div>

<div class="text" id="rechargeText">
充值中心
</div>

</a>

<a class="card" href="/wallet.html">

<div class="icon">
🏧
</div>

<div class="text" id="withdrawText">
提款申请
</div>

</a>

<a class="card" href="/account.html">

<div class="icon">
👤
</div>

<div class="text" id="accountText">
我的账户
</div>

</a>

<a class="card" href="#">

<div class="icon">
📞
</div>

<div class="text" id="serviceText">
联系客服
</div>

</a>

</div>

</div>

<div class="bottom">

<div class="info">

💰

<div class="value">

8,880

</div>

<div id="balanceLabel">
Balance
</div>

</div>

<div class="info">

💎

<div class="value">

1,250

</div>

<div id="pointLabel">
Point
</div>

</div>

<div class="info">

👑

<div class="value">

VIP 8

</div>

<div id="memberLabel">
Member
</div>

</div>

</div>

<script>
const LANG = {
  zh:{
    game:"百家乐",
    shop:"积分商城",
    recharge:"充值中心",
    withdraw:"提款申请",
    account:"我的账户",
    service:"联系客服",
    balance:"Balance",
    point:"Point",
    member:"Member"
  },
  th:{
    game:"บาคาร่า",
    shop:"ร้านแลกของรางวัล",
    recharge:"เติมเงิน",
    withdraw:"ถอนเงิน",
    account:"บัญชีของฉัน",
    service:"ติดต่อแอดมิน",
    balance:"ยอดเงิน",
    point:"พอยท์",
    member:"สมาชิก"
  }
};

function switchLang(lang){
  const t = LANG[lang];

  document.getElementById("gameText").innerText = t.game;
  document.getElementById("shopText").innerText = t.shop;
  document.getElementById("rechargeText").innerText = t.recharge;
  document.getElementById("withdrawText").innerText = t.withdraw;
  document.getElementById("accountText").innerText = t.account;
  document.getElementById("serviceText").innerText = t.service;
document.getElementById("balanceLabel").innerText = t.balance;
document.getElementById("pointLabel").innerText = t.point;
document.getElementById("memberLabel").innerText = t.member;
  localStorage.setItem("homeLang", lang);
}

switchLang(localStorage.getItem("homeLang") || "zh");
</script>
  
</body>

</html>
