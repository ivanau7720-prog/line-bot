<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">

<title>SIAMBET88</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{

height:100vh;

overflow:auto;

font-family:sans-serif;

background:

linear-gradient(
rgba(0,0,0,.20),
rgba(0,0,0,.70)
),

url("/lobby-bg.jpg");

background-size:cover;

background-position:center top;

color:white;

}

.wrap{
padding:
20px
20px
120px;
}

.logo-spacer{
height:360px;
}

.langBox{
position:fixed;
top:18px;
right:18px;
z-index:10;
}

.langBox button{
background:rgba(0,0,0,.55);
color:gold;
border:1px solid rgba(255,215,0,.5);
border-radius:18px;
padding:8px 12px;
margin-left:6px;
}
  
.grid{

display:grid;

grid-template-columns:
1fr
1fr;

gap:18px;

}

.card{

height:115px;

border-radius:30px;

background:

linear-gradient(
180deg,
rgba(20,20,20,.82),
rgba(0,0,0,.62)
);

backdrop-filter:
blur(20px);

border:

1px solid
rgba(255,215,0,.30);

display:flex;

flex-direction:column;

justify-content:center;

align-items:center;

text-decoration:none;

color:white;

box-shadow:

0 0 40px rgba(
255,
180,
0,
.12
);

transition:.35s;

}

.card:hover{

transform:
translateY(-6px);

border:

1px solid gold;

box-shadow:

0 0 60px gold;

}

.icon{

font-size:34px;

margin-bottom:10px;

filter:

drop-shadow(
0 0 10px gold
);

}

.text{

font-size:24px;

color:gold;

}

.sub{

margin-top:8px;

color:#ddd;

}
.noticeBox{

margin-top:22px;

padding:18px;

border-radius:24px;

background:
linear-gradient(
180deg,
rgba(0,0,0,.65),
rgba(0,0,0,.42)
);

border:

1px solid
rgba(255,215,0,.35);

box-shadow:

0 0 35px
rgba(255,215,0,.16);

text-align:center;

backdrop-filter:
blur(16px);

}

.noticeTitle{

color:gold;

font-size:18px;

font-weight:bold;

margin-bottom:8px;

text-shadow:
0 0 12px gold;

}

#noticeText{

font-size:15px;

color:white;

}

.noticeSmall{

margin-top:6px;

font-size:12px;

color:#ddd;

}
.bottom{

position:fixed;

bottom:18px;

left:14px;

right:14px;

padding:12px;

background:

rgba(
0,
0,
0,
.55
);

backdrop-filter:
blur(18px);

border:

1px solid
rgba(
255,
215,
0,
.35
);

border-radius:24px;

display:flex;

justify-content:
space-around;

box-shadow:

0 0 35px
rgba(
255,
215,
0,
.20
);

}

.info{

text-align:center;

min-width:90px;

}

.value{

color:gold;

font-size:18px;

font-weight:bold;

text-shadow:

0 0 15px gold;

margin-top:8px;

}

</style>

</head>

<body>
  
<div class="langBox">
  <button onclick="switchLang('zh')">中文</button>
  <button onclick="switchLang('th')">ไทย</button>
</div>
  
<div class="wrap">

<div class="logo-spacer"></div>

<div class="grid">

<a class="card" href="/index.html">

<div class="icon">
🎮
</div>

<div class="text" id="gameText">
百家乐
</div>

<div class="sub">
BACCARAT
</div>

</a>

<a class="card" href="/shop.html">

<div class="icon">
🎁
</div>

<div class="text" id="shopText">
积分商城
</div>

</a>

<a class="card" href="/wallet.html">

<div class="icon">
💰
</div>

<div class="text" id="rechargeText">
充值中心
</div>

</a>

<a class="card" href="/wallet.html">

<div class="icon">
🏧
</div>

<div class="text" id="withdrawText">
提款申请
</div>

</a>

<a class="card" href="/account.html">

<div class="icon">
👤
</div>

<div class="text" id="accountText">
我的账户
</div>

</a>

<a class="card" href="#">

<div class="icon">
📞
</div>

<div class="text" id="serviceText">
联系客服
</div>

</a>

</div>

<div class="noticeBox">

<div class="noticeTitle" id="noticeTitle">
🔥 今日活动
</div>

<div id="noticeText">
充值 100 THB = 获得 10 💎 Point
</div>

<div class="noticeSmall" id="noticeSmall">
积分商城即将开放
</div>

</div>

</div>

<div class="bottom">

<div class="info">

💰

<div
class="value"
id="balanceValue">

0

</div>

<div id="balanceLabel">
Balance
</div>

</div>

<div class="info">

💎

<div
class="value"
id="pointValue">

0

</div>

<div id="pointLabel">
Point
</div>

</div>

<div class="info">

👑

<div
class="value"
id="vipValue">

VIP 10

</div>

<div id="memberLabel">
Member
</div>

</div>

</div>

<script>
const LANG = {
  zh:{
    game:"百家乐",
    shop:"积分商城",
    recharge:"充值中心",
    withdraw:"提款申请",
    account:"我的账户",
    service:"联系客服",
    balance:"Balance",
    point:"Point",
    member:"Member",
    noticeTitle:"🔥 今日活动",
    noticeText:"充值 100 THB = 获得 10 💎 Point",
    noticeSmall:"积分商城即将开放"
  },
 th:{
    game:"บาคาร่า",
    shop:"ร้านแลกของรางวัล",
    recharge:"เติมเงิน",
    withdraw:"ถอนเงิน",
    account:"บัญชีของฉัน",
    service:"ติดต่อแอดมิน",
    balance:"ยอดเงิน",
    point:"พอยท์",
    member:"สมาชิก",
    noticeTitle:"🔥 โปรโมชันวันนี้",
    noticeText:"เติมเงิน 100 THB = รับ 10 💎 Point",
    noticeSmall:"ร้านแลกของรางวัลกำลังจะเปิด"
  }
};

function switchLang(lang){
  const t = LANG[lang];

  document.getElementById("gameText").innerText = t.game;
  document.getElementById("shopText").innerText = t.shop;
  document.getElementById("rechargeText").innerText = t.recharge;
  document.getElementById("withdrawText").innerText = t.withdraw;
  document.getElementById("accountText").innerText = t.account;
  document.getElementById("serviceText").innerText = t.service;
document.getElementById("balanceLabel").innerText = t.balance;
document.getElementById("pointLabel").innerText = t.point;
document.getElementById("memberLabel").innerText = t.member;
  document.getElementById("noticeTitle").innerText = t.noticeTitle;
document.getElementById("noticeText").innerText = t.noticeText;
document.getElementById("noticeSmall").innerText = t.noticeSmall;
  localStorage.setItem("homeLang", lang);
}

switchLang(localStorage.getItem("homeLang") || "zh");
async function loadProfile(){

const uid =
localStorage.getItem(
"userId"
);

if(!uid)return;

try{

const res =
await fetch(
"/balance/" + uid
);

const data =
await res.json();

document
.getElementById(
"balanceValue"
).innerText =
Number(
data.balance || 0
).toLocaleString();

document
.getElementById(
"pointValue"
).innerText =
Number(
data.point || 0
).toLocaleString();

document
.getElementById(
"vipValue"
).innerText =
"VIP " +
Number(
data.vip || 10
);

}catch(e){

console.log(e);

}

}

loadProfile();
</script>
  
</body>

</html>
