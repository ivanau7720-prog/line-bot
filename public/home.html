<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SIAMBET88</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{

height:100vh;

overflow:auto;

font-family:sans-serif;

background:

linear-gradient(
rgba(0,0,0,.20),
rgba(0,0,0,.70)
),

url("/lobby-bg.jpg");

background-size:cover;

background-position:center top;

color:white;

}

.wrap{

padding-top:0px;

padding-left:20px;

padding-right:20px;

padding-bottom:120px;

transform:
translateY(-45px);

}

.logo-spacer{
height:330px;
}

.langBox{
position:fixed;
top:18px;
right:18px;
z-index:10;
}

.langBox button{
background:rgba(0,0,0,.55);
color:gold;
border:1px solid rgba(255,215,0,.5);
border-radius:18px;
padding:8px 12px;
margin-left:6px;
}
.welcomeBox{

margin-bottom:14px;

padding:12px;

border-radius:18px;

background:
rgba(
0,
0,
0,
.48
);

border:
1px solid
rgba(
255,
215,
0,
.28
);

color:gold;

text-align:center;

font-size:16px;

text-shadow:
0 0 12px gold;

}
.vipProgressBox{

margin-bottom:14px;

padding:12px;

border-radius:18px;

background:
rgba(
0,
0,
0,
.48
);

border:
1px solid
rgba(
255,
215,
0,
.28
);

text-align:center;

}

#vipProgressText{

color:#ddd;

font-size:13px;

margin-bottom:8px;

}

.vipBar{

height:10px;

background:
rgba(
255,
255,
255,
.15
);

border-radius:20px;

overflow:hidden;

}

#vipBarFill{

height:100%;

width:0%;

background:gold;

border-radius:20px;

transition:.5s;

}
.grid{

display:grid;

grid-template-columns:
1fr
1fr;

gap:18px;

}

.card{

height:105px;

border-radius:30px;

background:

linear-gradient(
180deg,
rgba(20,20,20,.82),
rgba(0,0,0,.62)
);

backdrop-filter:
blur(20px);

border:

1px solid
rgba(255,215,0,.30);

display:flex;

flex-direction:column;

justify-content:center;

align-items:center;

text-decoration:none;

color:white;

box-shadow:

0 0 40px rgba(
255,
180,
0,
.12
);

transition:.35s;

}

.card:hover{

transform:
translateY(-6px);

border:

1px solid gold;

box-shadow:

0 0 60px gold;

}

.icon{

font-size:34px;

margin-bottom:10px;

filter:

drop-shadow(
0 0 10px gold
);

}

.text{

font-size:21px;

color:gold;

line-height:1.15;

text-align:center;

padding:0 8px;

}

.sub{

margin-top:6px;

color:#ddd;

font-size:13px;

letter-spacing:1px;

}
.noticeBox{

margin-top:18px;

padding:18px;

border-radius:24px;

background:
linear-gradient(
180deg,
rgba(0,0,0,.65),
rgba(0,0,0,.42)
);

border:

1px solid
rgba(255,215,0,.35);

box-shadow:

0 0 35px
rgba(255,215,0,.16);

text-align:center;

backdrop-filter:
blur(16px);

}

.noticeTitle{

color:gold;

font-size:18px;

font-weight:bold;

margin-bottom:8px;

text-shadow:
0 0 12px gold;

}

#noticeText{

font-size:15px;

color:white;

}

.noticeSmall{

margin-top:6px;

font-size:12px;

color:#ddd;

}
.bottom{

position:fixed;

bottom:18px;

left:14px;

right:14px;

padding:12px;

background:

rgba(
0,
0,
0,
.55
);

backdrop-filter:
blur(18px);

border:

1px solid
rgba(
255,
215,
0,
.35
);

border-radius:24px;

display:flex;

justify-content:
space-around;

box-shadow:

0 0 35px
rgba(
255,
215,
0,
.20
);

}

.info{

text-align:center;

min-width:90px;

}

.value{

color:gold;

font-size:18px;

font-weight:bold;

text-shadow:

0 0 15px gold;

margin-top:8px;

}
.vipGlow,
.valueGlow{

animation:
vipFlash 1s ease-in-out 3;

}

@keyframes vipFlash{

0%{
transform:scale(1);
text-shadow:0 0 15px gold;
}

50%{
transform:scale(1.25);
text-shadow:0 0 35px gold;
}

100%{
transform:scale(1);
text-shadow:0 0 15px gold;
}

}
</style>

</head>

<body>
  
<div class="langBox">
  <button onclick="switchLang('zh')">中文</button>
  <button onclick="switchLang('th')">ไทย</button>
</div>
  
<div class="wrap">

<div class="logo-spacer"></div>

<div class="welcomeBox" id="welcomeText">
欢迎回来
</div>
<div class="vipProgressBox">

<div id="vipProgressText">
距离下一级 VIP：--
</div>

<div class="vipBar">

<div id="vipBarFill"></div>

</div>

</div>
<div class="grid">

<a class="card" href="/index.html">

<div class="icon">
🎮
</div>

<div class="text" id="gameText">
百家乐
</div>

<div class="sub">
BACCARAT
</div>

</a>

<a class="card" href="/shop.html">

<div class="icon">
🎁
</div>

<div class="text" id="shopText">
积分商城
</div>

</a>

<a class="card" href="/wallet.html">

<div class="icon">
💰
</div>

<div class="text" id="rechargeText">
充值中心
</div>

</a>

<a class="card" href="/wallet.html?tab=withdraw">

<div class="icon">
🏧
</div>

<div class="text" id="withdrawText">
提款申请
</div>

</a>

<a class="card" href="/account.html">

<div class="icon">
👤
</div>

<div class="text" id="accountText">
我的账户
</div>

</a>

<a class="card" href="/account.html">

<div class="icon">
📞
</div>

<div class="text" id="serviceText">
联系客服
</div>

</a>

</div>

<div class="noticeBox">

<div class="noticeTitle" id="noticeTitle">
🔥 今日活动
</div>

<div id="noticeText">
充值 100 THB = 获得 10 💎 Point
</div>

<div class="noticeSmall" id="noticeSmall">
积分商城即将开放
</div>

</div>

</div>
<div id="playerAnnouncement"

style="
display:none;

position:fixed;

inset:0;

background:
rgba(0,0,0,.82);

z-index:99999;

padding:20px;

">

<div style="

max-width:520px;

margin:auto;

background:#111;

padding:18px;

border-radius:20px;

border:1px solid gold;

">

<div style="
display:flex;
justify-content:space-between;
">

<h3 id="announcementTitle">
📢 ประกาศ
</h3>

<button
onclick="
closePlayerAnnouncement()
"
>

✕

</button>

</div>

<div
id="playerAnnouncementContent"
>

加载中...

</div>

</div>

</div>
<div class="bottom">

<div class="info">

💰

<div
class="value"
id="balanceValue">

0

</div>

<div id="balanceLabel">
Balance
</div>

</div>

<div class="info">

💎

<div
class="value"
id="pointValue">

0

</div>

<div id="pointLabel">
Point
</div>

</div>

<div class="info">

👑

<div
class="value"
id="vipValue">

VIP 10

</div>

<div id="memberLabel">
Member
</div>

</div>

</div>

<script>
const userId =
localStorage.getItem("userId");

if(!userId){

location.href =
"/login.html";

}  
const LANG = {
  zh:{
    game:"百家乐",
    shop:"积分商城",
    recharge:"充值中心",
    withdraw:"提款申请",
    account:"我的账户",
    service:"联系客服",
    balance:"Balance",
    point:"Point",
    member:"Member",
    noticeTitle:"🔥 今日活动",
    noticeText:"充值 100 THB = 获得 10 💎 Point",
   noticeSmall:"积分商城即将开放",
welcome:"欢迎回来",
vipNext:"距离下一级 VIP："
  },
 th:{
    game:"บาคาร่า",
    shop:"ร้านแลกของรางวัล",
    recharge:"เติมเงิน",
    withdraw:"ถอนเงิน",
    account:"บัญชีของฉัน",
    service:"ติดต่อแอดมิน",
    balance:"ยอดเงิน",
    point:"พอยท์",
    member:"สมาชิก",
    noticeTitle:"🔥 โปรโมชันวันนี้",
    noticeText:"เติมเงิน 100 THB = รับ 10 💎 Point",
   noticeSmall:"ร้านแลกของรางวัลกำลังจะเปิด",
welcome:"ยินดีต้อนรับกลับ",
vipNext:"ยอดเติมที่เหลือถึง VIP ถัดไป："
  }
};

function switchLang(lang){
  const t = LANG[lang];

  document.getElementById("gameText").innerText = t.game;
  document.getElementById("shopText").innerText = t.shop;
  document.getElementById("rechargeText").innerText = t.recharge;
  document.getElementById("withdrawText").innerText = t.withdraw;
  document.getElementById("accountText").innerText = t.account;
  document.getElementById("serviceText").innerText = t.service;
document.getElementById("balanceLabel").innerText = t.balance;
document.getElementById("pointLabel").innerText = t.point;
document.getElementById("memberLabel").innerText = t.member;
  document.getElementById("noticeTitle").innerText = t.noticeTitle;
document.getElementById("noticeText").innerText = t.noticeText;
document.getElementById("noticeSmall").innerText = t.noticeSmall;
  const username =
localStorage.getItem("username") || localStorage.getItem("userId") || "";

document.getElementById("welcomeText").innerText =
t.welcome + " " + username;
  localStorage.setItem("homeLang", lang);
}

switchLang(localStorage.getItem("homeLang") || "zh");
async function loadProfile(){

const uid =
localStorage.getItem(
"userId"
);

if(!uid)return;

try{

const res =
await fetch(
"/balance/" + uid
);

const data =
await res.json();

const balanceEl =
document.getElementById(
"balanceValue"
);

const oldBalance =
balanceEl.innerText;

const newBalance =
Number(
data.balance || 0
).toLocaleString();

balanceEl.innerText =
newBalance;

if(oldBalance !== newBalance){

balanceEl.classList.remove(
"valueGlow"
);

void balanceEl.offsetWidth;

balanceEl.classList.add(
"valueGlow"
);

}

const pointEl =
document.getElementById(
"pointValue"
);

const oldPoint =
pointEl.innerText;

const newPoint =
Number(
data.point || 0
).toLocaleString();

pointEl.innerText =
newPoint;

if(oldPoint !== newPoint){

pointEl.classList.remove(
"valueGlow"
);

void pointEl.offsetWidth;

pointEl.classList.add(
"valueGlow"
);

}
const vipEl =
document.getElementById(
"vipValue"
);

const oldVip =
vipEl.innerText;

const newVip =
"VIP " +
Number(
data.vip_level || data.vip || 10
);

vipEl.innerText =
newVip;

if(oldVip !== newVip){

vipEl.classList.remove(
"vipGlow"
);

void vipEl.offsetWidth;

vipEl.classList.add(
"vipGlow"
);

}

const vipNum =
Number(
data.vip_level || data.vip || 10
);

if(vipNum <= 3){

vipEl.style.color =
"#ff4d4d";

}else if(vipNum <= 6){

vipEl.style.color =
"#ffcc00";

}else{

vipEl.style.color =
"gold";

}
const totalTopup =
Number(data.total_topup || 0);

let nextTarget = 10000;

if(totalTopup >= 10000) nextTarget = 20000;
if(totalTopup >= 20000) nextTarget = 40000;
if(totalTopup >= 40000) nextTarget = 80000;
if(totalTopup >= 80000) nextTarget = 150000;
if(totalTopup >= 150000) nextTarget = 300000;
if(totalTopup >= 300000) nextTarget = 500000;
if(totalTopup >= 500000) nextTarget = 800000;
if(totalTopup >= 800000) nextTarget = 1000000;

const percent =
Math.min(
(totalTopup / nextTarget) * 100,
100
);

document.getElementById("vipBarFill").style.width =
percent + "%";

const lang =
localStorage.getItem("homeLang") || "zh";

document.getElementById("vipProgressText").innerText =
LANG[lang].vipNext +
Math.max(nextTarget - totalTopup,0).toLocaleString();
}catch(e){

console.log(e);

}

}
async function loadPlayerAnnouncement(){

const res =
await fetch("/announcement?showTo=player");

const data =
await res.json();

if(!data){
return;
}

document.getElementById("playerAnnouncement").style.display =
"block";

document.getElementById("playerAnnouncementContent").innerHTML =
`
<h2 style="color:gold;">
${data.title || ""}
</h2>

${
data.image_url
?
`<img src="${data.image_url}" style="width:100%;border-radius:12px;margin-top:10px;">`
:
""
}

<div style="margin-top:14px;white-space:pre-wrap;">
${data.content || ""}
</div>
`;

}

function closePlayerAnnouncement(){

document.getElementById("playerAnnouncement").style.display =
"none";

}
loadPlayerAnnouncement();

loadProfile();

setInterval(()=>{

loadProfile();

},5000);
</script>
  
</body>

</html>
