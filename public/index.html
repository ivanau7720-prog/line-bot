<style>
html, body{

body{
  background: radial-gradient(circle at center, #0b3d2e, #000);

}

.container{

  .top{
    flex:6;
  }

  }

  #chip10, #chip50, #chip100{
    width:45px !important;
    height:45px !important;
    font-size:12px;
  }

  #areaB, #areaP{
    width:140px !important;
    height:90px !important;
    font-size:18px !important;
  }

  #areaT{
    width:110px !important;
    height:70px !important;
    font-size:16px !important;
  }

  h3{
    font-size:14px;
  }

 h2{
  font-size:16px;
}

.bet-area{
  display:flex;
  justify-content:center;
}
}

</style>
  
</head>

<body>

<audio id="betSound" src="https://www.soundjay.com/buttons/sounds/button-16.mp3"></audio>

<!-- 👇👇👇 在这里加 👇👇👇 -->
<div id="resultFlash" style="
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.8);

justify-content:center;
font-size:80px;
font-weight:bold;
color:gold;
z-index:9999;
opacity:0;
pointer-events:none;
transition:0.5s;
">
RESULT
</div>

  <div id="winPopup" style="
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%) scale(0.5);
background:rgba(0,0,0,0.8);
padding:20px 40px;
border-radius:20px;
color:gold;
font-size:28px;
font-weight:bold;
z-index:9999;
opacity:0;
pointer-events:none;
transition:0.3s;
box-shadow:0 0 20px gold, 0 0 60px gold;
">
🎉 你赢了 +0
</div>

<div class="container">

<div class="top" style="
border-bottom:3px solid gold;
box-shadow:0 0 40px gold inset;
background:radial-gradient(circle,#0b3d2e,#000);
">

<iframe 
src="https://www.youtube.com/embed/h9fSJYh11QA"
style="
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
border:none;
object-fit:cover;
">
</iframe>

<div style="
position:absolute;
top:10px;
right:10px;
background:rgba(0,0,0,0.6);
padding:10px;
border-radius:10px;
font-size:12px;
display:flex;
flex-wrap:wrap;
max-width:200px;
">

  <div style="width:100%;margin-bottom:5px;color:gold">📊 路单</div>

  <div id="history" style="
    display:flex;
    flex-wrap:wrap;
    gap:4px;
  "></div>

</div>
  
  <!-- 标题浮在视频上 -->
  <div style="
    position:absolute;
    top:10px;
    left:10px;
    font-size:18px;
    font-weight:bold;
    background:rgba(0,0,0,0.6);
    padding:5px 10px;
    border-radius:10px;
  ">
    🎰 百家乐系统
  </div>

</div>
  
<div class="bottom" style="
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
padding:20px 0;
">

<div style="
width:100%;
max-width:900px;
margin:auto;
">
  
<div class="bet-area">

  <div id="status">...</div>
  <div id="stats">...</div>
  <div id="balance">...</div>

</div>

  <!-- 已选 -->
  <div style="color:gold;font-size:18px;">
    已选：<span id="selected">0</span>
  </div>

 <div style="
display:flex;
justify-content:center;
align-items:center;
gap:50px;
margin-top:25px;
flex-wrap:wrap;
">

  <!-- 筹码 -->
  <div style="display:flex;gap:10px;">
    <div id="chip10" onclick="selectChip(10)" class="chip">10</div>
    <div id="chip50" onclick="selectChip(50)" class="chip">50</div>
    <div id="chip100" onclick="selectChip(100)" class="chip">100</div>
  </div>

  <!-- 下注 -->
  <div style="display:flex;gap:10px;">

    <!-- 闲 -->
    <div id="areaP" onclick="bet('P')" style="
      width:220px;height:130px;
      font-size:20px;
      background:linear-gradient(#2a4fff,#001aff);
      border-radius:20px;
      display:flex;align-items:center;justify-content:center;
      font-weight:bold;cursor:pointer;
    ">🔵 闲</div>

    <!-- 和 -->
    <div id="areaT" onclick="bet('T')" style="
      width:220px;height:130px;
      font-size:20px;
      background:linear-gradient(#28c76f,#007f3b);
      border-radius:20px;
      display:flex;align-items:center;justify-content:center;
      font-weight:bold;cursor:pointer;
    ">🟢 和</div>

    <!-- 庄 -->
    <div id="areaB" onclick="bet('B')" style="
      width:220px;height:130px;
      font-size:20px;
      background:linear-gradient(#ff4b4b,#8b0000);
      border-radius:20px;
      display:flex;align-items:center;justify-content:center;
      font-weight:bold;cursor:pointer;
    ">🔴 庄</div>

  </div>

</div>

</div>
  
  <div id="progressBar" style="
  width:100%;
  height:10px;
  background:#333;
  border-radius:10px;
  overflow:hidden;
  margin-top:5px;
">
  <div id="progressInner" style="
    height:100%;
    width:100%;
    background:linear-gradient(90deg, #00ff99, #ffff00, #ff0000);
box-shadow: 0 0 15px lime, 0 0 25px red;
transition: width 1s linear, background 0.3s;
  "></div>
</div>
  


</div>




</div>
<h3 id="msg"></h3>



<script>

let lastResult = "";

let countdown = 60;
let timerInterval = null;
let wasBetting = false; 
let totalTime = 60;  

// 下注
async function bet(side) {

  // 🔥 下注锁定（防作弊）
  const state = await fetch("/state").then(r => r.json());

  if (!state.isBetting) {
    alert("❌ 已停止下注");
    return;
  }

const userId = currentUserId;
const amount = selectedAmount;

window.myLastBet = {
  side: side,
  amount: amount
};

if (!userId) {
  alert("请通过LINE进入游戏");
  return;
}

if (!amount) {
  alert("请选择筹码");
  return;
}

const playerName = currentUserId;

  const res = await fetch("/bet", {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({ userId, side, amount })
  });

  const data = await res.json();

  // 💥 UI金额 + 动画
  if (side === "B") {
  flyChip("totalB");
    let el = document.getElementById("totalB");
el.innerHTML += `<div style="font-size:12px;color:gold">
${playerName} 💰${amount}
</div>`;
  }

  if (side === "P") {
    flyChip("totalP");
    let el = document.getElementById("totalP");
el.innerHTML += `<div style="font-size:12px;color:gold">
${playerName} 💰${amount}
</div>`;
  }

  if (side === "T") {
    flyChip("totalT");
    let el = document.getElementById("totalT");
el.innerHTML += `<div style="font-size:12px;color:gold">
${playerName} 💰${amount}
</div>`;
  }

  document.getElementById("msg").innerText = data.msg || "下注成功";
  document.getElementById("betSound").play();
}

// 状态
async function loadState() {
  const res = await fetch("/state");
  const data = await res.json();

  let countB = 0;
  let countP = 0;
  let countT = 0;
  // 原本状态（保留）
 if (data.isBetting) {

  // 👉 如果刚开始下注（第一次）
  if (!wasBetting) {

    countdown = 60;

    // 防止重复
    if (timerInterval) {
      clearInterval(timerInterval);
    }

    timerInterval = setInterval(async () => {

      document.getElementById("status").innerText =
  "🟢 下注中（" + countdown + "秒）";

/* 👇 加这一段（进度条核心） */
let percent = (countdown / totalTime) * 100;
document.getElementById("progressInner").style.width = percent + "%";

/* 👇👇👇 把刚才那段代码贴在这里 👇👇👇 */
if (countdown <= 5 && countdown > 0) {

  document.getElementById("progressInner").style.background = "red";

  document.getElementById("progressInner").style.opacity =
    (countdown % 2 === 0) ? "1" : "0.3";

  const tick = document.getElementById("tickSound");
  tick.currentTime = 0;
  tick.play();

} else {

  document.getElementById("progressInner").style.background =
    "linear-gradient(90deg, #00ff99, #ffff00, #ff0000)"

  document.getElementById("progressInner").style.opacity = "1";
}
/* 👆👆👆 贴到这里结束 👆👆👆 */

countdown--;

      // ⛔ 时间到自动停止
      if (countdown < 0 && timerInterval) {
        clearInterval(timerInterval);
        timerInterval = null;

        await fetch("/stop", { method: "POST" });

        document.getElementById("status").innerText = "🔴 停止下注";
        document.getElementById("progressInner").style.width = "0%";
      }

    }, 1000);
  }

  wasBetting = true;

} else {

  document.getElementById("status").innerText = "🔴 停止下注";

  // 停止倒计时
  if (timerInterval) {
    clearInterval(timerInterval);
    timerInterval = null;
  }

  wasBetting = false;
}

  // 💥 清空显示
  document.getElementById("totalB").innerHTML = "";
  document.getElementById("totalP").innerHTML = "";
  document.getElementById("totalT").innerHTML = "";

  // 💥 显示所有玩家下注
for (const uid in data.total) {
  const bet = data.total[uid];

  // 👇 就是在这里加（这3行）
  if (bet.side === "B") countB++;
  if (bet.side === "P") countP++;
  if (bet.side === "T") countT++;

  let target = "";

  if (bet.side === "B") target = "totalB";
  if (bet.side === "P") target = "totalP";
  if (bet.side === "T") target = "totalT";

  document.getElementById(target).innerHTML += `
    <div style="font-size:12px;color:gold">
      ${uid} 💰${bet.amount}
    </div>
  `;
}
document.getElementById("countB").innerText = countB;
document.getElementById("countP").innerText = countP;
document.getElementById("countT").innerText = countT;
}
// 历史
async function loadHistory() {
  const res = await fetch("/history");
  const data = await res.json();

let columns = [];
let col = [];
let lastType = "";
  
data.forEach(r => {
  if (!r.result) return;

  if (r.result === lastType || lastType === "") {
    col.push(r.result);
  } else {
    columns.push(col);
    col = [r.result];
  }

  lastType = r.result;
});

if (col.length > 0) columns.push(col);

let html = '<div style="display:flex;align-items:flex-start">';

columns.forEach(c => {
  html += '<div style="display:flex;flex-direction:column;margin-right:3px">';
  
  c.forEach(r => {
    let color = "red";
    if (r === "P") color = "blue";
    if (r === "T") color = "green";

    html += `<div style="
      width:14px;
      height:14px;
      border-radius:50%;
      background:${color};
      margin-bottom:3px;
    "></div>`;
  });

  html += '</div>';
});

html += '</div>';
  
if (data.length > 0) {
  const last = data[data.length - 1];

 if (last.result && last.result !== lastResult) {
  lastResult = last.result;
  showResult(last.result);
}
}
  document.getElementById("history").innerHTML = html;
}

// ===== 余额 =====
async function loadBalance() {
  const userId = currentUserId;

  if (!userId) return;

  const res = await fetch("/balance/" + userId);
  const data = await res.json();

  document.getElementById("balance").innerText =
    "余额：" + data.balance;
}

// ===== 统计 =====
async function loadStats() {
  const res = await fetch("/stats");
  const data = await res.json();

  document.getElementById("stats").innerText =
    `庄：${data.B} | 闲：${data.P} | 和：${data.T}`; 
}
  
// 自动刷新
setInterval(() => {
  loadState();
  loadHistory();
  loadBalance(); // 新
  loadStats();   // 新
}, 1000);


let currentUserId = "";
let selectedAmount = 0;

// 选择筹码
function selectChip(amount) {
  selectedAmount = amount;
 document.getElementById("selected").innerText = amount;
}

function flyChip(targetId) {
  const chip = document.getElementById("chip" + selectedAmount);
  const target = document.getElementById(targetId);

  if (!chip || !target) return;

  const chipRect = chip.getBoundingClientRect();
  const targetRect = target.getBoundingClientRect();

  const clone = chip.cloneNode(true);
target.appendChild(clone);

  clone.style.position = "fixed";
  clone.style.left = chipRect.left + "px";
  clone.style.top = chipRect.top + "px";
  clone.style.zIndex = 9999;

  // 动画
  clone.animate([
    {
      transform: "translate(0,0) scale(1)"
    },
    {
      transform: `translate(${targetRect.left - chipRect.left}px, ${targetRect.top - chipRect.top}px) scale(0.6)`
    }
  ], {
    duration: 500,
    easing: "ease-out"
  });

  setTimeout(() => {
  // 👉 不删除，改为堆叠到目标
  clone.style.position = "absolute";
  clone.style.left = (target.offsetLeft + Math.random() * 30) + "px";
  clone.style.top = (target.offsetTop + Math.random() * 30) + "px";
  clone.style.transform = "scale(0.6)";
}, 500);
}
  
// ===== 自动读取 LINE 登录 =====
window.onload = function () {
  const params = new URLSearchParams(window.location.search);

  const userId = params.get("userId");
  const name = params.get("name");

 if (userId) {
  currentUserId = userId; 
}

};

function showResult(result) {

  const B = document.getElementById("areaB");
  const P = document.getElementById("areaP");
  const T = document.getElementById("areaT");

  B.style.opacity = 0.3;
  P.style.opacity = 0.3;
  T.style.opacity = 0.3;

  let win = null;

  if (result === "B") win = B;
  if (result === "P") win = P;
  if (result === "T") win = T;

  if (!win) return;

  const myBet = window.myLastBet;

  if (myBet && myBet.side === result) {
    showWin(myBet.amount);
  }

  // 💥 发光
  win.style.opacity = 1;
  win.style.transform = "scale(1.2)";
  win.style.boxShadow = "0 0 80px gold, 0 0 150px gold";

  const flash = document.getElementById("resultFlash");

  let text = "RESULT";
  if (result === "B") text = "庄 WIN";
  if (result === "P") text = "闲 WIN";
  if (result === "T") text = "和";

  flash.innerText = text;
  flash.style.opacity = 1;

  setTimeout(() => {
    flash.style.opacity = 0;
  }, 1500);
}

function showWin(amount){

  const el = document.getElementById("winPopup");

  el.innerText = "🎉 你赢了 +" + amount;

  el.style.opacity = 1;
  el.style.transform = "translate(-50%,-50%) scale(1.2)";

  document.getElementById("winSound").play();

  setTimeout(() => {
    el.style.opacity = 0;
    el.style.transform = "translate(-50%,-50%) scale(0.5)";
  }, 1500);
}
  
</script>
</body>
</html>
