<!DOCTYPE html>
<html>
<body style="background:black;color:white;text-align:center;font-family:sans-serif">

<h1>🎰 百家乐系统</h1>
<h2>🎥 直播画面</h2>

<iframe width="100%" height="420"
src="https://www.youtube.com/embed/直播ID"
frameborder="0"
allowfullscreen>
</iframe>
  

<hr>

<h2>📊 游戏状态</h2>
<h3 id="status">加载中...</h3>

<h2>📊 下注统计</h2>
<div id="stats">加载中...</div>
  
<hr>

<h2>💰 玩家下注</h2>
<h3 id="balance">余额：--</h3>


<h3>💰 选择筹码</h3>

<div style="display:flex;justify-content:center;gap:15px;margin-top:15px">

  <div id="chip10" onclick="selectChip(10)"
     style="width:60px;height:60px;border-radius:50%;
     background:white;color:black;
     display:flex;align-items:center;justify-content:center;
     font-weight:bold;cursor:pointer;
     transition:0.2s;"
     onmouseover="this.style.transform='scale(1.2)'"
     onmouseout="this.style.transform='scale(1)'">
  10
</div>

 <div id="chip50" onclick="selectChip(50)"
     style="width:60px;height:60px;border-radius:50%;
     background:blue;color:white;
     display:flex;align-items:center;justify-content:center;
     font-weight:bold;cursor:pointer;
     transition:0.2s;"
     onmouseover="this.style.transform='scale(1.2)'"
     onmouseout="this.style.transform='scale(1)'">
  50
</div>

  <div id="chip100" onclick="selectChip(100)"
     style="width:60px;height:60px;border-radius:50%;
     background:red;color:white;
     display:flex;align-items:center;justify-content:center;
     font-weight:bold;cursor:pointer;
     transition:0.2s;"
     onmouseover="this.style.transform='scale(1.2)'"
     onmouseout="this.style.transform='scale(1)'">
  100
</div>

</div>

<h2 id="selected" style="color:gold;margin-top:10px">已选：0</h2>

<h2 style="margin-top:20px">🎯 下注区域</h2>

<div style="display:flex;width:100%;margin-top:20px">

  <!-- 闲 -->
 <div onclick="bet('P')" 
     style="flex:1;
     background:#1e3cff;
     height:160px;
     border:3px solid gold;
     box-shadow:0 0 20px gold;
     transition:0.2s;
     display:flex;flex-direction:column;
     align-items:center;justify-content:center;
     font-size:32px;font-weight:bold;
     cursor:pointer;"
     onmouseover="this.style.transform='scale(1.05)'; this.style.boxShadow='0 0 40px gold'"
     onmouseout="this.style.transform='scale(1)'; this.style.boxShadow='0 0 20px gold'">
    闲（<span id="countP">0</span>人 🔥）
    <div id="totalP" style="font-size:16px;margin-top:10px"></div>
  </div>

  <!-- 和 -->
 <div onclick="bet('T')" 
     style="flex:1;
     background:#1ca84c;
     height:160px;
     border:3px solid gold;
     box-shadow:0 0 20px gold;
     transition:0.2s;
     display:flex;flex-direction:column;
     align-items:center;justify-content:center;
     font-size:32px;font-weight:bold;
     cursor:pointer;"
     onmouseover="this.style.transform='scale(1.05)'; this.style.boxShadow='0 0 40px gold'"
     onmouseout="this.style.transform='scale(1)'; this.style.boxShadow='0 0 20px gold'">
    和（<span id="countT">0</span>人 🔥）
    <div id="totalT" style="font-size:16px;margin-top:10px"></div>
  </div>

  <!-- 庄 -->
 <div onclick="bet('B')" 
     style="flex:1;
     background:#d62828;
     height:160px;
     border:3px solid gold;
     box-shadow:0 0 20px gold;
     transition:0.2s;
     display:flex;flex-direction:column;
     align-items:center;justify-content:center;
     font-size:32px;font-weight:bold;
     cursor:pointer;"
     onmouseover="this.style.transform='scale(1.05)'; this.style.boxShadow='0 0 40px gold'"
     onmouseout="this.style.transform='scale(1)'; this.style.boxShadow='0 0 20px gold'">
    
    庄（<span id="countB">0</span>人 🔥）
<div id="totalB" style="font-size:16px;margin-top:10px"></div>
  </div>

</div>
<h3 id="msg"></h3>

<hr>

<h2>📜 历史记录</h2>
<div id="history"></div>

<script>


// 下注
async function bet(side) {

  // 🔥 下注锁定（防作弊）
  const state = await fetch("/state").then(r => r.json());

  if (!state.isBetting) {
    alert("❌ 已停止下注");
    return;
  }

const userId = currentUserId;
const amount = selectedAmount;

if (!userId) {
  alert("请通过LINE进入游戏");
  return;
}

if (!amount) {
  alert("请选择筹码");
  return;
}

const playerName = document.querySelector("h1").innerText.replace("🎰 百家乐系统 - ", "");

  const res = await fetch("/bet", {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({ userId, side, amount })
  });

  const data = await res.json();

  // 💥 UI金额 + 动画
  if (side === "B") {
    flyChip("betB");
    let el = document.getElementById("totalB");
el.innerHTML += `<div style="font-size:12px;color:gold">
${playerName} 💰${amount}
</div>`;
  }

  if (side === "P") {
    flyChip("betP");
    let el = document.getElementById("totalP");
el.innerHTML += `<div style="font-size:12px;color:gold">
${playerName} 💰${amount}
</div>`;
  }

  if (side === "T") {
    flyChip("betT");
    let el = document.getElementById("totalT");
el.innerHTML += `<div style="font-size:12px;color:gold">
${playerName} 💰${amount}
</div>`;
  }

  document.getElementById("msg").innerText = data.msg || "下注成功";
}

// 状态
async function loadState() {
  const res = await fetch("/state");
  const data = await res.json();

  let countB = 0;
  let countP = 0;
  let countT = 0;
  // 原本状态（保留）
  document.getElementById("status").innerText =
  data.isBetting ? "🟢 下注中" : "🔴 停止下注";

  // 💥 清空显示
  document.getElementById("totalB").innerHTML = "";
  document.getElementById("totalP").innerHTML = "";
  document.getElementById("totalT").innerHTML = "";

  // 💥 显示所有玩家下注
for (const uid in data.total) {
  const bet = data.total[uid];

  // 👇 就是在这里加（这3行）
  if (bet.side === "B") countB++;
  if (bet.side === "P") countP++;
  if (bet.side === "T") countT++;

  let target = "";

  if (bet.side === "B") target = "totalB";
  if (bet.side === "P") target = "totalP";
  if (bet.side === "T") target = "totalT";

  document.getElementById(target).innerHTML += `
    <div style="font-size:12px;color:gold">
      ${uid} 💰${bet.amount}
    </div>
  `;
}
document.getElementById("countB").innerText = countB;
document.getElementById("countP").innerText = countP;
document.getElementById("countT").innerText = countT;
}
// 历史
async function loadHistory() {
  const res = await fetch("/history");
  const data = await res.json();

  let html = "";
  data.forEach(r => {
    html += `<span style="margin:5px">${r.result || "-"}</span>`;
  });

  document.getElementById("history").innerHTML = html;
}

// ===== 余额 =====
async function loadBalance() {
  const userId = currentUserId;

  if (!userId) return;

  const res = await fetch("/balance/" + userId);
  const data = await res.json();

  document.getElementById("balance").innerText =
    "余额：" + data.balance;
}

// ===== 统计 =====
async function loadStats() {
  const res = await fetch("/stats");
  const data = await res.json();

  document.getElementById("stats").innerText =
    `庄：${data.B} | 闲：${data.P} | 和：${data.T}`; 
}
  
// 自动刷新
setInterval(() => {
  loadState();
  loadHistory();
  loadBalance(); // 新
  loadStats();   // 新
}, 1000);


let currentUserId = "";
let selectedAmount = 0;

// 选择筹码
function selectChip(amount) {
  selectedAmount = amount;
  document.getElementById("selected").innerText = "已选：" + amount;
}

function flyChip(targetId) {
  const chip = document.getElementById("chip" + selectedAmount);
  const target = document.getElementById(targetId);

  if (!chip || !target) return;

  const chipRect = chip.getBoundingClientRect();
  const targetRect = target.getBoundingClientRect();

  const clone = chip.cloneNode(true);
target.appendChild(clone);

  clone.style.position = "fixed";
  clone.style.left = chipRect.left + "px";
  clone.style.top = chipRect.top + "px";
  clone.style.zIndex = 9999;

  // 动画
  clone.animate([
    {
      transform: "translate(0,0) scale(1)"
    },
    {
      transform: `translate(${targetRect.left - chipRect.left}px, ${targetRect.top - chipRect.top}px) scale(0.6)`
    }
  ], {
    duration: 500,
    easing: "ease-out"
  });

  setTimeout(() => {
  // 👉 不删除，改为堆叠到目标
  clone.style.position = "absolute";
  clone.style.left = (target.offsetLeft + Math.random() * 30) + "px";
  clone.style.top = (target.offsetTop + Math.random() * 30) + "px";
  clone.style.transform = "scale(0.6)";
}, 500);
}
  
// ===== 自动读取 LINE 登录 =====
window.onload = function () {
  const params = new URLSearchParams(window.location.search);

  const userId = params.get("userId");
  const name = params.get("name");

 if (userId) {
  currentUserId = userId; 
}

  if (name) {
    document.querySelector("h1").innerText = "🎰 百家乐系统 - " + name;
  }
};
  
</script>

</body>
</html>
