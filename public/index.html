<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
html, body{
  height:100%;
  margin:0;
  overflow:hidden;
}

body{
  background:black;
  color:white;
  text-align:center;
  font-family:sans-serif;
}

.container{
  display:flex;

  height:100vh;
}

.top{
  flex:7;
  position:relative;
}

.bottom{
  flex:3;
  background:#111;
  padding:10px;
  display:flex;
  flex-direction:column;
  justify-content:space-between;
}

.top iframe{
  width:100%;
  height:100%;
  border:none;
}

/* 📱 手机适配（就在这里加👇） */

  .top{
    flex:6;
  }

  .bottom{
    flex:4;
  }

  #chip10, #chip50, #chip100{
    width:45px !important;
    height:45px !important;

  }

  #areaB, #areaP{
    width:140px !important;
    height:90px !important;
    font-size:18px !important;
  }

  #areaT{
    width:110px !important;
    height:70px !important;
    font-size:16px !important;
  }

  h3{
    font-size:14px;
  }

 h2{
  font-size:16px;
}

.bet-area{
  display:flex;
  justify-content:center;
  gap:10px;
  font-size:14px;
  flex-wrap:wrap;
}

}

</style>
  
</head>

<body>

<audio id="betSound" src="https://www.soundjay.com/buttons/sounds/button-16.mp3"></audio>
<audio id="winSound" src="https://www.soundjay.com/misc/sounds/bell-ringing-05.mp3"></audio>

<!-- 👇👇👇 在这里加 👇👇👇 -->
<div id="resultFlash" style="
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.8);
display:flex;
align-items:center;
justify-content:center;
font-size:80px;
font-weight:bold;
color:gold;
z-index:9999;
opacity:0;
pointer-events:none;
transition:0.5s;
">
RESULT
</div>
<!-- 👆👆👆 加到这里 👆👆👆 -->

<div class="container">

<div class="top">

  <iframe 
    src="https://www.youtube.com/embed/直播ID"
    style="width:100%;height:100%;border:none">
  </iframe>

<div style="
position:absolute;
top:10px;
right:10px;
background:rgba(0,0,0,0.6);
padding:10px;
border-radius:10px;
font-size:12px;
display:flex;
flex-wrap:wrap;
max-width:200px;
">

  <div style="width:100%;margin-bottom:5px;color:gold">📊 路单</div>

  <div id="history" style="
    display:flex;
    flex-wrap:wrap;
    gap:4px;
  "></div>

</div>
  
  <!-- 标题浮在视频上 -->
  <div style="
    position:absolute;
    top:10px;
    left:10px;
    font-size:18px;
    font-weight:bold;
    background:rgba(0,0,0,0.6);
    padding:5px 10px;
    border-radius:10px;
  ">
    🎰 百家乐系统
  </div>

</div>
  
<div class="bottom">
 
<div class="bet-area">

  <div id="status">加载中...</div>
  <div id="stats">加载中...</div>
  <div id="balance">余额：--</div>

</div>

<h3>💰 选择筹码</h3>

<div style="display:flex;justify-content:center;gap:15px;margin-top:15px">

  <div id="chip10" onclick="selectChip(10)"
     style="width:60px;height:60px;border-radius:50%;
     background:white;color:black;
     display:flex;align-items:center;justify-content:center;
     font-weight:bold;cursor:pointer;
     transition:0.2s;"
     onmouseover="this.style.transform='scale(1.2)'"
     onmouseout="this.style.transform='scale(1)'">
  10
</div>

 <div id="chip50" onclick="selectChip(50)"
     style="width:60px;height:60px;border-radius:50%;
     background:blue;color:white;
     display:flex;align-items:center;justify-content:center;
     font-weight:bold;cursor:pointer;
     transition:0.2s;"
     onmouseover="this.style.transform='scale(1.2)'"
     onmouseout="this.style.transform='scale(1)'">
  50
</div>

  <div id="chip100" onclick="selectChip(100)"
     style="width:60px;height:60px;border-radius:50%;
     background:red;color:white;
     display:flex;align-items:center;justify-content:center;
     font-weight:bold;cursor:pointer;
     transition:0.2s;"
     onmouseover="this.style.transform='scale(1.2)'"
     onmouseout="this.style.transform='scale(1)'">
  100
</div>

</div>

<h2 id="selected" style="color:gold;margin-top:10px">已选：0</h2>

<div style="
  display:flex;
  justify-content:center;
  gap:10px;
  margin-top:20px;
  padding:15px;
  border:3px solid gold;
  border-radius:20px;
  box-shadow:0 0 30px gold inset, 0 0 20px gold;
  background:radial-gradient(circle at center, #222, #000);
">

  <!-- 闲 -->
  <div id="areaP" onclick="bet('P')"
    style="
    width:220px;
    height:140px;
    background:linear-gradient(#2a4fff,#001aff);
    border-radius:20px;
    box-shadow:0 0 25px #1e3cff, 0 0 60px rgba(0,0,255,0.4) inset;
border:2px solid gold;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    font-size:26px;
    font-weight:bold;
    cursor:pointer;
    transition:0.3s;
  "
  onmouseover="
this.style.transform='scale(1.1)';
this.style.boxShadow='0 0 60px gold, 0 0 100px blue';
"
  onmouseout="this.style.transform='scale(1)'">

    🔵 闲
    <div style="font-size:14px;margin-top:5px">
      👥 <span id="countP">0</span>
    </div>
    <div id="totalP" style="font-size:12px;color:gold;margin-top:8px"></div>

  </div>

<!-- 和 -->
<div id="areaT" onclick="bet('T')"
  style="
  width:180px;
  height:120px;
  background:linear-gradient(#28c76f,#007f3b);
  border-radius:20px;
 box-shadow:0 0 25px #00ff88, 0 0 60px rgba(0,255,100,0.4) inset;
border:2px solid gold;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  font-size:22px;
  font-weight:bold;
  cursor:pointer;
  transition:0.3s;
"
onmouseover="
this.style.transform='scale(1.1)';
this.style.boxShadow='0 0 60px gold, 0 0 100px #00ff88';
"
onmouseout="this.style.transform='scale(1)'">

  🟢 和
  <div style="font-size:12px;margin-top:5px">
    👥 <span id="countT">0</span>
  </div>
  <div id="totalT" style="font-size:11px;color:gold;margin-top:6px"></div>

</div>
  
  <!-- 庄 -->
  <div id="areaB" onclick="bet('B')" 
    style="
    width:220px;
    height:140px;
    background:linear-gradient(#ff4b4b,#8b0000);
    border-radius:20px;
   box-shadow:0 0 25px red, 0 0 60px rgba(255,0,0,0.4) inset;
border:2px solid gold;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    font-size:26px;
    font-weight:bold;
    cursor:pointer;
    transition:0.3s;
  "
  onmouseover="
this.style.transform='scale(1.1)';
this.style.boxShadow='0 0 60px gold, 0 0 100px red';
"
  onmouseout="this.style.transform='scale(1)'">

    🔴 庄
    <div style="font-size:14px;margin-top:5px">
      👥 <span id="countB">0</span>
    </div>
    <div id="totalB" style="font-size:12px;color:gold;margin-top:8px"></div>

  </div>
  

</div>
<h3 id="msg"></h3>



<script>

let lastResult = "";

let countdown = 60;
let timerInterval = null;
let wasBetting = false;  

// 下注
async function bet(side) {

  // 🔥 下注锁定（防作弊）
  const state = await fetch("/state").then(r => r.json());

  if (!state.isBetting) {
    alert("❌ 已停止下注");
    return;
  }

const userId = currentUserId;
const amount = selectedAmount;

if (!userId) {
  alert("请通过LINE进入游戏");
  return;
}

if (!amount) {
  alert("请选择筹码");
  return;
}

const playerName = currentUserId;

  const res = await fetch("/bet", {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({ userId, side, amount })
  });

  const data = await res.json();

  // 💥 UI金额 + 动画
  if (side === "B") {
  flyChip("totalB");
    let el = document.getElementById("totalB");
el.innerHTML += `<div style="font-size:12px;color:gold">
${playerName} 💰${amount}
</div>`;
  }

  if (side === "P") {
    flyChip("totalP");
    let el = document.getElementById("totalP");
el.innerHTML += `<div style="font-size:12px;color:gold">
${playerName} 💰${amount}
</div>`;
  }

  if (side === "T") {
    flyChip("totalT");
    let el = document.getElementById("totalT");
el.innerHTML += `<div style="font-size:12px;color:gold">
${playerName} 💰${amount}
</div>`;
  }

  document.getElementById("msg").innerText = data.msg || "下注成功";
  document.getElementById("betSound").play();
}

// 状态
async function loadState() {
  const res = await fetch("/state");
  const data = await res.json();

  let countB = 0;
  let countP = 0;
  let countT = 0;
  // 原本状态（保留）
 if (data.isBetting) {

  // 👉 如果刚开始下注（第一次）
  if (!wasBetting) {

    countdown = 60;

    // 防止重复
    if (timerInterval) {
      clearInterval(timerInterval);
    }

    timerInterval = setInterval(async () => {

      document.getElementById("status").innerText =
        "🟢 下注中（" + countdown + "秒）";

      countdown--;

      // ⛔ 时间到自动停止
      if (countdown < 0 && timerInterval) {
        clearInterval(timerInterval);
        timerInterval = null;

        await fetch("/stop", { method: "POST" });

        document.getElementById("status").innerText = "🔴 停止下注";
      }

    }, 1000);
  }

  wasBetting = true;

} else {

  document.getElementById("status").innerText = "🔴 停止下注";

  // 停止倒计时
  if (timerInterval) {
    clearInterval(timerInterval);
    timerInterval = null;
  }

  wasBetting = false;
}

  // 💥 清空显示
  document.getElementById("totalB").innerHTML = "";
  document.getElementById("totalP").innerHTML = "";
  document.getElementById("totalT").innerHTML = "";

  // 💥 显示所有玩家下注
for (const uid in data.total) {
  const bet = data.total[uid];

  // 👇 就是在这里加（这3行）
  if (bet.side === "B") countB++;
  if (bet.side === "P") countP++;
  if (bet.side === "T") countT++;

  let target = "";

  if (bet.side === "B") target = "totalB";
  if (bet.side === "P") target = "totalP";
  if (bet.side === "T") target = "totalT";

  document.getElementById(target).innerHTML += `
    <div style="font-size:12px;color:gold">
      ${uid} 💰${bet.amount}
    </div>
  `;
}
document.getElementById("countB").innerText = countB;
document.getElementById("countP").innerText = countP;
document.getElementById("countT").innerText = countT;
}
// 历史
async function loadHistory() {
  const res = await fetch("/history");
  const data = await res.json();

let columns = [];
let col = [];
let lastType = "";
  
data.forEach(r => {
  if (!r.result) return;

  if (r.result === lastType || lastType === "") {
    col.push(r.result);
  } else {
    columns.push(col);
    col = [r.result];
  }

  lastType = r.result;
});

if (col.length > 0) columns.push(col);

let html = '<div style="display:flex;align-items:flex-start">';

columns.forEach(c => {
  html += '<div style="display:flex;flex-direction:column;margin-right:3px">';
  
  c.forEach(r => {
    let color = "red";
    if (r === "P") color = "blue";
    if (r === "T") color = "green";

    html += `<div style="
      width:14px;
      height:14px;
      border-radius:50%;
      background:${color};
      margin-bottom:3px;
    "></div>`;
  });

  html += '</div>';
});

html += '</div>';
  
if (data.length > 0) {
  const last = data[data.length - 1];

 if (last.result && last.result !== lastResult) {
  lastResult = last.result;
  showResult(last.result);
}
}
  document.getElementById("history").innerHTML = html;
}

// ===== 余额 =====
async function loadBalance() {
  const userId = currentUserId;

  if (!userId) return;

  const res = await fetch("/balance/" + userId);
  const data = await res.json();

  document.getElementById("balance").innerText =
    "余额：" + data.balance;
}

// ===== 统计 =====
async function loadStats() {
  const res = await fetch("/stats");
  const data = await res.json();

  document.getElementById("stats").innerText =
    `庄：${data.B} | 闲：${data.P} | 和：${data.T}`; 
}
  
// 自动刷新
setInterval(() => {
  loadState();
  loadHistory();
  loadBalance(); // 新
  loadStats();   // 新
}, 1000);


let currentUserId = "";
let selectedAmount = 0;

// 选择筹码
function selectChip(amount) {
  selectedAmount = amount;
  document.getElementById("selected").innerText = "已选：" + amount;
}

function flyChip(targetId) {
  const chip = document.getElementById("chip" + selectedAmount);
  const target = document.getElementById(targetId);

  if (!chip || !target) return;

  const chipRect = chip.getBoundingClientRect();
  const targetRect = target.getBoundingClientRect();

  const clone = chip.cloneNode(true);
target.appendChild(clone);

  clone.style.position = "fixed";
  clone.style.left = chipRect.left + "px";
  clone.style.top = chipRect.top + "px";
  clone.style.zIndex = 9999;

  // 动画
  clone.animate([
    {
      transform: "translate(0,0) scale(1)"
    },
    {
      transform: `translate(${targetRect.left - chipRect.left}px, ${targetRect.top - chipRect.top}px) scale(0.6)`
    }
  ], {
    duration: 500,
    easing: "ease-out"
  });

  setTimeout(() => {
  // 👉 不删除，改为堆叠到目标
  clone.style.position = "absolute";
  clone.style.left = (target.offsetLeft + Math.random() * 30) + "px";
  clone.style.top = (target.offsetTop + Math.random() * 30) + "px";
  clone.style.transform = "scale(0.6)";
}, 500);
}
  
// ===== 自动读取 LINE 登录 =====
window.onload = function () {
  const params = new URLSearchParams(window.location.search);

  const userId = params.get("userId");
  const name = params.get("name");

 if (userId) {
  currentUserId = userId; 
}

};

function showResult(result) {

  const B = document.getElementById("areaB");
  const P = document.getElementById("areaP");
  const T = document.getElementById("areaT");

  // 先全部变暗
  B.style.opacity = 0.3;
  P.style.opacity = 0.3;
  T.style.opacity = 0.3;

  let win = null;

  if (result === "B") win = B;
  if (result === "P") win = P;
  if (result === "T") win = T;

  if (!win) return;

  // 💥 胜利发光
  win.style.opacity = 1;
  win.style.transform = "scale(1.2)";
  win.style.boxShadow = "0 0 80px gold, 0 0 150px gold";
  const flash = document.getElementById("resultFlash");

let text = "RESULT";
if (result === "B") text = "庄 WIN";
if (result === "P") text = "闲 WIN";
if (result === "T") text = "和";

flash.innerText = text;
flash.style.opacity = 1;
flash.style.transform = "scale(1.2)";

// 1.5秒后消失
setTimeout(() => {
  flash.style.opacity = 0;
flash.style.transform = "scale(1)";
}, 1500);
  document.getElementById("winSound").play();
  // ✨ 1.5秒后恢复
  setTimeout(() => {
    B.style.opacity = 1;
    P.style.opacity = 1;
    T.style.opacity = 1;

    B.style.transform = "scale(1)";
    P.style.transform = "scale(1)";
    T.style.transform = "scale(1)";

  }, 1500);
}
  
</script>

</div>
</body>
</html>
