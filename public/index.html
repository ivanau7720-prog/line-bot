<!DOCTYPE html>
<html>
<body style="background:black;color:white;text-align:center;font-family:sans-serif">

<h1>🎰 百家乐系统</h1>

<button onclick="login()">LINE 登录</button>
  
<h2>🎮 控制台</h2>
<button onclick="startGame()">开始游戏</button>
<button onclick="result('B')">开庄</button>
<button onclick="result('P')">开闲</button>
<button onclick="result('T')">开和</button>

<hr>

<h2>📊 游戏状态</h2>
<h3 id="status">加载中...</h3>

<h2>📊 下注统计</h2>
<div id="stats">加载中...</div>
  
<hr>

<h2>💰 玩家下注</h2>
<h3 id="balance">余额：--</h3>

<input id="userId" placeholder="输入ID"><br><br>
<input id="amount" placeholder="金额"><br><br>

<button onclick="bet('B')">庄</button>
<button onclick="bet('P')">闲</button>
<button onclick="bet('T')">和</button>

<h3 id="msg"></h3>

<hr>

<h2>📜 历史记录</h2>
<div id="history"></div>

<script>
// ===== 读取登录信息 =====
const params = new URLSearchParams(window.location.search);
const userIdFromUrl = params.get("userId");

if (userIdFromUrl) {
  window.addEventListener("DOMContentLoaded", () => {
    document.getElementById("userId").value = userIdFromUrl;
  });
}
  
// 开局
async function startGame() {
  const res = await fetch("/start", { method: "POST" });
  const data = await res.json();
  alert(data.msg);
}

// 结算
async function result(r) {
  try {
    const res = await fetch("/result", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ result: r })
    });

    const data = await res.json();

    // 🔥 防 undefined（关键）
    if (!data || !data.msg) {
      alert("❌ 后端没有返回 msg");
      console.log("返回内容:", data);
      return;
    }

    alert(data.msg);

  } catch (err) {
    alert("❌ 请求失败");
    console.error(err);
  }
}

// 下注
async function bet(side) {
  const userId = document.getElementById("userId").value;
  const amount = Number(document.getElementById("amount").value);

  const res = await fetch("/bet", {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({ userId, side, amount })
  });

  const data = await res.json();
  document.getElementById("msg").innerText = data.msg || "下注成功";
}

// 状态
async function loadState() {
  const res = await fetch("/state");
  const data = await res.json();

  document.getElementById("status").innerText =
    (data.isBetting ? "🟢 可下注" : "🔴 停止") +
    " | 剩余: " + data.timeLeft;
}

// 历史
async function loadHistory() {
  const res = await fetch("/history");
  const data = await res.json();

  let html = "";
  data.forEach(r => {
    html += `<span style="margin:5px">${r.result || "-"}</span>`;
  });

  document.getElementById("history").innerHTML = html;
}

// ===== 余额 =====
async function loadBalance() {
  const userId = document.getElementById("userId").value;

  if (!userId) return;

  const res = await fetch("/balance/" + userId);
  const data = await res.json();

  document.getElementById("balance").innerText =
    "余额：" + data.balance;
}

// ===== 统计 =====
async function loadStats() {
  const res = await fetch("/stats");
  const data = await res.json();

  document.getElementById("stats").innerText =
    `庄：${data.B} | 闲：${data.P} | 和：${data.T}`; 
}
  
// 自动刷新
setInterval(() => {
  loadState();
  loadHistory();
  loadBalance(); // 新
  loadStats();   // 新
}, 1000);

function login() {
  window.location.href = "/login";
}
  
</script>

</body>
</html>
