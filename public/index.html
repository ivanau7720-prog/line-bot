});

}

<script>

function confirmBet(event){

const btn = event.target;

btn.style.transform = "scale(0.95)";

setTimeout(()=>{
btn.style.transform = "scale(1)";
},150);

document.getElementById("betSound").play();

document.getElementById("msg").innerText =
"✔ ยืนยันเดิมพัน สำเร็จ";

}
  
let lastResult = "";

let countdown = 60;
let timerInterval = null;
let wasBetting = false; 
let totalTime = 60;  

// 下注
async function bet(side) {

  // 🔥 下注锁定（防作弊）
  const state = await fetch("/state").then(r => r.json());

  if (!state.isBetting) {
    alert("❌ 已停止下注");
    return;
  }

const userId = currentUserId;
const amount = selectedAmount;

window.myLastBet = {
  side: side,
  amount: amount
};

if (!userId) {
  alert("请通过LINE进入游戏");
  return;
}

if (!amount) {
  alert("请选择筹码");
  return;
}

const playerName = currentUserId;

  const res = await fetch("/bet", {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({ userId, side, amount })
  });

  const data = await res.json();

  // 💥 UI金额 + 动画
  if (side === "B") {
  flyChip("totalB");
    let el = document.getElementById("totalB");
el.innerHTML += `<div style="font-size:12px;color:gold">
${playerName} 💰${amount}
</div>`;
  }

  if (side === "P") {
    flyChip("totalP");
    let el = document.getElementById("totalP");
el.innerHTML += `<div style="font-size:12px;color:gold">
${playerName} 💰${amount}
</div>`;
  }

  if (side === "T") {
    flyChip("totalT");
    let el = document.getElementById("totalT");
el.innerHTML += `<div style="font-size:12px;color:gold">
${playerName} 💰${amount}
</div>`;
  }

  document.getElementById("msg").innerText = data.msg || "下注成功";
  document.getElementById("betSound").play();
}

// 状态
async function loadState() {
  const res = await fetch("/state");
  const data = await res.json();
  document.getElementById("roundNo").innerText =
"🎯 รอบที่ " + data.round;

  let countB = 0;
  let countP = 0;
  let countT = 0;
  // 原本状态（保留）
 if (data.isBetting) {

   document.getElementById("areaB").classList.remove("disabled");
   document.getElementById("areaP").classList.remove("disabled");
   document.getElementById("areaT").classList.remove("disabled");
   
  // 👉 如果刚开始下注（第一次）
  if (!wasBetting) {

    countdown = 60;

    // 防止重复
    if (timerInterval) {
      clearInterval(timerInterval);
    }

    timerInterval = setInterval(async () => {

      document.getElementById("status").innerText =
      "🟢 เปิดรับเดิมพัน " + countdown + " วิ"

/* 👇 加这一段（进度条核心） */
let percent = (countdown / totalTime) * 100;
document.getElementById("progressInner").style.width = percent + "%";

/* 👇👇👇 把刚才那段代码贴在这里 👇👇👇 */
if (countdown <= 5 && countdown > 0) {

  document.getElementById("progressInner").style.background =
"linear-gradient(90deg,#ff0000,#990000,#ff0000)";

document.getElementById("progressInner").style.boxShadow =
"0 0 20px red,0 0 40px red";

document.getElementById("status").style.color = "#ff0000";

document.getElementById("status").style.textShadow =
"0 0 10px red,0 0 30px red";

document.getElementById("progressInner").style.opacity =
(countdown % 2 === 0) ? "1" : "0.25";

const tick = document.getElementById("tickSound");
tick.currentTime = 0;
tick.play();

} else {

  document.getElementById("progressInner").style.background =
    "linear-gradient(90deg, #00ff99, #ffff00, #ff0000)"

  document.getElementById("progressInner").style.opacity = "1";
}
/* 👆👆👆 贴到这里结束 👆👆👆 */

countdown--;

      // ⛔ 时间到自动停止
      if (countdown < 0 && timerInterval) {
        clearInterval(timerInterval);
        timerInterval = null;

        await fetch("/stop", { method: "POST" });

        document.getElementById("status").innerText = "🔴 ปิดรับเดิมพัน";
        document.getElementById("progressInner").style.width = "0%";
        document.getElementById("areaB").classList.add("disabled");

  document.getElementById("areaP").classList.add("disabled");
  document.getElementById("areaT").classList.add("disabled");

  if (timerInterval) {
    clearInterval(timerInterval);
    timerInterval = null;
  }

  wasBetting = false;
}

  // 💥 清空显示
  document.getElementById("totalB").innerHTML = "";
  document.getElementById("totalP").innerHTML = "";
  document.getElementById("totalT").innerHTML = "";

  // 💥 显示所有玩家下注
for (const uid in data.total) {

  // 👇 就是在这里加（这3行）
  if (bet.side === "B") countB++;
  if (bet.side === "P") countP++;
  if (bet.side === "T") countT++;

  let target = "";

  if (bet.side === "B") target = "totalB";
  if (bet.side === "P") target = "totalP";
  if (bet.side === "T") target = "totalT";

  document.getElementById(target).innerHTML += `
    <div style="font-size:12px;color:gold">
      ${uid} 💰${bet.amount}
    </div>
  `;
}
document.getElementById("countB").innerText = countB;
document.getElementById("countP").innerText = countP;
document.getElementById("countT").innerText = countT;
}

async function loadHistory() {

  const data = await res.json();

let columns = [];
let col = [];
let lastType = "";
  
data.forEach(r => {
  if (!r.result) return;

  if (r.result === lastType || lastType === "") {
    col.push(r.result);
  } else {
    columns.push(col);
    col = [r.result];
  }

  lastType = r.result;
});

if (col.length > 0) columns.push(col);

let html = '<div style="display:flex;align-items:flex-start">';

columns.forEach(c => {
  html += '<div style="display:flex;flex-direction:column;margin-right:3px">';
  
  c.forEach(r => {
    let color = "red";
    if (r === "P") color = "blue";
    if (r === "T") color = "green";

    html += `<div style="
      width:14px;
      height:14px;
      border-radius:50%;
      background:${color};
      margin-bottom:3px;
    "></div>`;
  });

  html += '</div>';
});

html += '</div>';
  
if (data.length > 0) {
  const last = data[data.length - 1];

 if (last.result && last.result !== lastResult) {
  lastResult = last.result;
  showResult(last.result);
}
}
  document.getElementById("history").innerHTML = html;
}

function flyChip(targetId) {
  const chip = document.getElementById("chip" + selectedAmount);
  const target = document.getElementById(targetId);

  if (!chip || !target) return;

  const chipRect = chip.getBoundingClientRect();
  const targetRect = target.getBoundingClientRect();

  const clone = chip.cloneNode(true);
target.appendChild(clone);

  clone.style.position = "fixed";
  clone.style.left = chipRect.left + "px";
  clone.style.top = chipRect.top + "px";
  clone.style.zIndex = 9999;

  // 动画
  clone.animate([
    {
      transform: "translate(0,0) scale(1)"
    },
    {
      transform: `translate(${targetRect.left - chipRect.left}px, ${targetRect.top - chipRect.top}px) scale(0.6)`
    }
  ], {
    duration: 500,
    easing: "ease-out"
  });

  setTimeout(() => {
  // 👉 不删除，改为堆叠到目标
  clone.style.position = "absolute";
  clone.style.left = (target.offsetLeft + Math.random() * 30) + "px";
  clone.style.top = (target.offsetTop + Math.random() * 30) + "px";
  clone.style.transform = "scale(0.6)";
}, 500);
}

}
