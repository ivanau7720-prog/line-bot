<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Member Login</title>

<style>
body{
margin:0;
background:#000;
font-family:sans-serif;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
color:white;
}

.box{
width:340px;
background:rgba(255,255,255,0.05);
padding:30px;
border-radius:18px;
box-shadow:0 0 20px rgba(255,215,0,.3);
text-align:center;
}

h1{
color:gold;
margin-bottom:25px;
}

input{
width:100%;
padding:14px;
margin:8px 0;
border:none;
border-radius:10px;
font-size:16px;
box-sizing:border-box;
}

button{
width:100%;
padding:14px;
margin-top:10px;
border:none;
border-radius:10px;
font-size:16px;
font-weight:bold;
cursor:pointer;
}

.loginBtn{
background:gold;
color:black;
}

.regBtn{
background:#06c755;
color:white;
}

.small{
margin-top:15px;
font-size:14px;
color:#ccc;
}

#msg{
margin-top:15px;
color:#ff8080;
min-height:20px;
}
</style>
</head>

<body>

<div class="box">

<h1>🎰 MEMBER LOGIN</h1>

<input id="username" placeholder="Player ID">
<input id="password" type="password" placeholder="Password">

<button class="loginBtn" onclick="login()">
LOGIN
</button>

<button class="regBtn" onclick="register()">
REGISTER
</button>

<div class="small">
Forgot password? Contact Customer Service
</div>

<div id="msg"></div>

</div>

<script>

async function login(){

const username =
document.getElementById("username").value.trim();

const password =
document.getElementById("password").value.trim();

const res = await fetch("/member-login",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
username,password
})
});

const data = await res.json();

if(data.success){

location.href =
"/index.html?userId=" +
data.userId +
"&name=" +
encodeURIComponent(data.name);

}else{

document.getElementById("msg").innerText =
data.msg;

}

}

async function register(){

const username =
document.getElementById("username").value.trim();

const password =
document.getElementById("password").value.trim();

const res = await fetch("/register",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
username,password
})
});

const data = await res.json();

document.getElementById("msg").innerText =
data.msg || "Success";

}

</script>

</body>
</html>
