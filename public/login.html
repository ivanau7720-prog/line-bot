<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Member Login</title>

<style>
body{
margin:0;
background:#000;
font-family:sans-serif;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
color:white;
}

.box{
width:340px;
background:rgba(255,255,255,0.05);
padding:30px;
border-radius:18px;
box-shadow:0 0 20px rgba(255,215,0,.3);
text-align:center;
}

h1{
color:gold;
margin-bottom:25px;
}

input{
width:100%;
padding:14px;
margin:8px 0;
border:none;
border-radius:10px;
font-size:16px;
box-sizing:border-box;
}

button{
width:100%;
padding:14px;
margin-top:10px;
border:none;
border-radius:10px;
font-size:16px;
font-weight:bold;
cursor:pointer;
}

.loginBtn{
background:gold;
color:black;
}

.regBtn{
background:#06c755;
color:white;
}

.small{
margin-top:15px;
font-size:14px;
color:#ccc;
}

#msg{
margin-top:15px;
color:#ff8080;
min-height:20px;
}
</style>
</head>

<body>

<div class="box">

<h1>👑 SIAMBET88</h1>

<div style="
color:#ffd700;
font-size:14px;
margin-top:-15px;
margin-bottom:20px;
letter-spacing:2px;
">
VIP MEMBER LOGIN
</div>

<input id="username" placeholder="Player ID">
<input id="password" type="password" placeholder="Password">

<button class="loginBtn" onclick="login()">
LOGIN
</button>

<button class="regBtn" onclick="openRegisterBox()">
CREATE ACCOUNT
</button>

<div class="small">
Forgot password? Contact Customer Service
</div>

<div id="msg"></div>

</div>

<div id="registerBox" style="
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.85);
justify-content:center;
align-items:center;
z-index:9999;
">

<div style="
width:340px;
background:linear-gradient(180deg,#111,#000);
border:1px solid gold;
border-radius:18px;
padding:25px;
box-shadow:0 0 30px gold;
text-align:center;
">

<h1 style="color:gold;font-size:24px;">
CREATE ACCOUNT
</h1>

<input id="regUsername" placeholder="Player ID 4-12 letters/numbers">

<input id="regPassword" type="password" placeholder="Password">

<input id="regConfirmPassword" type="password" placeholder="Confirm Password">

<input id="regAgentCode" placeholder="Invite Code / Agent Code (optional)">

<button class="regBtn" onclick="register()">
CREATE NOW
</button>

<button onclick="closeRegisterBox()" style="
background:#333;
color:white;
">
CANCEL
</button>

<div id="regMsg" style="
margin-top:12px;
color:#ff8080;
min-height:20px;
font-size:14px;
"></div>

</div>
</div>

<script>

async function login(){

const username =
document.getElementById("username").value.trim();

const password =
document.getElementById("password").value.trim();

const res = await fetch("/member-login",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
username,password
})
});

const data = await res.json();

if(data.success){
// 临时登录资料（关网页自动消失）
localStorage.setItem("userId", data.userId);
localStorage.setItem("name", data.name);

location.href = "/index.html";
}else{

document.getElementById("msg").innerText =
data.msg;

}

}

async function register(){

const username =
document.getElementById("regUsername").value.trim();

const password =
document.getElementById("regPassword").value.trim();

const confirm =
document.getElementById("regConfirmPassword").value.trim();

const agentCode =
document.getElementById("regAgentCode").value.trim();

if(password!==confirm){

document.getElementById("regMsg").innerText=
"Password not match";

return;

}

const res =
await fetch("/register",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({

username,
password,
agentCode

})

});

const data =
await res.json();

document.getElementById("regMsg").innerText=
data.msg || "Account Created";

if(data.success){

document.getElementById("regMsg").innerText =
"Account Created Successfully...";

setTimeout(()=>{

document.getElementById("username").value =
username;

document.getElementById("password").value =
password;

closeRegisterBox();

login();

},1200);

}

}

function openRegisterBox(){

document.getElementById(
"registerBox"
).style.display="flex";

}

function closeRegisterBox(){

document.getElementById(
"registerBox"
).style.display="none";

document.getElementById(
"regMsg"
).innerText="";

}


</script>

</body>
</html>
