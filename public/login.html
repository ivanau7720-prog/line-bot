<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>LINE Login</title>

<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

<style>
body{
margin:0;
background:#000;
font-family:sans-serif;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
color:white;
}

.box{
text-align:center;
background:rgba(255,255,255,0.05);
padding:40px;
border-radius:20px;
box-shadow:0 0 20px rgba(0,255,255,.3);
width:320px;
}

h1{
color:#ffd700;
margin-bottom:30px;
}

button{
width:100%;
padding:15px;
border:none;
border-radius:12px;
background:#06c755;
color:white;
font-size:18px;
font-weight:bold;
cursor:pointer;
}
</style>
</head>

<body>

<div class="box">
<h1>🎰 บาคาร่า</h1>

<button onclick="startLogin()">
💬 เข้าสู่ระบบด้วย LINE
</button>
</div>

<script>

window.onload = async function(){

try{

await liff.init({
liffId:"2009844440-ReRexgWo"
});

if(liff.isLoggedIn()){

const profile = await liff.getProfile();

location.href =
"/index.html?userId=" +
profile.userId +
"&name=" +
encodeURIComponent(profile.displayName);

}

}catch(e){}

}

async function startLogin(){

try{

await liff.init({
liffId:"2009844440-ReRexgWo"
});

if(!liff.isLoggedIn()){

liff.login({
redirectUri:"https://line-bot-production-dabe.up.railway.app/"
});

return;
}

const profile = await liff.getProfile();

location.href =
"/index.html?userId=" +
profile.userId +
"&name=" +
encodeURIComponent(profile.displayName);

}catch(e){

alert("Login Error");

}

}

</script>

</body>
</html>
