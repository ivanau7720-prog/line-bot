<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Member Login</title>

<style>
body{
margin:0;

background:
linear-gradient(rgba(0,0,0,.25),rgba(0,0,0,.35)),
url("/login-bg.png");

background-size:cover;
background-position:center top;
background-repeat:no-repeat;

font-family:sans-serif;

display:flex;
justify-content:center;
align-items:center;

min-height:100vh;
height:100vh;

color:white;
overflow:hidden;
}

.box{

width:88%;
max-width:380px;

background:
linear-gradient(
180deg,
rgba(25,25,25,.58),
rgba(0,0,0,.78)
);

padding:40px 26px;

border-radius:30px;

border:
1px solid rgba(255,215,0,.55);

backdrop-filter:
blur(22px)
saturate(160%);
box-shadow:

0 0 0 1px rgba(255,255,255,.10),

0 0 45px rgba(255,215,0,.28),

0 0 120px rgba(255,180,0,.16),

inset 0 0 35px rgba(255,255,255,.08),

inset 0 -18px 35px rgba(0,0,0,.45);

text-align:center;

}


h1{
color:gold;
margin-bottom:25px;

text-shadow:
0 0 10px gold,
0 0 25px rgba(255,215,0,.65),
0 0 45px rgba(255,180,0,.35);

animation:logoGlow 2s infinite alternate;
}
input{

width:100%;

padding:16px;

margin:10px 0;

background:

linear-gradient(
180deg,
rgba(18,18,18,.92),
rgba(5,5,5,.98)
);

color:#ffd700;

border:

1px solid rgba(255,215,0,.30);

border-radius:16px;

font-size:15px;

box-sizing:border-box;

outline:none;

box-shadow:

0 0 12px rgba(255,215,0,.12),

inset 0 0 12px rgba(255,255,255,.03);

transition:.2s;

}
input::placeholder{

color:

rgba(255,255,255,.28);

}

button{
width:100%;
padding:15px;
margin-top:12px;
border:none;
border-radius:16px;
font-size:15px;
font-weight:bold;
cursor:pointer;
letter-spacing:1px;
}

.loginBtn{

background:

linear-gradient(
145deg,
#fff2a0,
#ffd700 35%,
#ff9900 70%,
#ffd700
);

color:#111;

border:
1px solid rgba(255,255,255,.35);

box-shadow:

0 0 16px rgba(255,215,0,.75),

0 0 38px rgba(255,180,0,.35),

inset 0 2px 8px rgba(255,255,255,.45),

inset 0 -8px 14px rgba(120,60,0,.28);

text-shadow:
0 1px 1px rgba(255,255,255,.45);

}
.loginBtn:active{

transform:scale(.97);

}

.regBtn{

background:

linear-gradient(
145deg,
#00ff99,
#00b359 35%,
#007733 70%,
#00ff99
);

color:white;

border:

1px solid rgba(255,255,255,.25);

box-shadow:

0 0 14px rgba(0,255,150,.45),

0 0 28px rgba(0,255,120,.20),

inset 0 2px 8px rgba(255,255,255,.18),

inset 0 -8px 14px rgba(0,40,20,.30);

text-shadow:

0 0 8px rgba(255,255,255,.35);

}
.regBtn:hover{

transform:
translateY(-1px);

filter:
brightness(1.08);

}

.regBtn:active{

transform:
scale(.97);

}  

.small{
margin-top:15px;
font-size:14px;
color:#ccc;
}

#msg{
margin-top:15px;
color:#ff8080;
min-height:20px;
}

@keyframes logoGlow{

0%{
transform:translateY(0);
filter:brightness(1);
}

100%{
transform:translateY(-3px);
filter:brightness(1.28);
}

}
  
</style>
</head>

<body>

<div class="box">

<h1>👑 SIAMBET88</h1>

<div style="
color:#ffd700;
font-size:14px;
margin-top:-15px;
margin-bottom:20px;
letter-spacing:2px;
">
VIP MEMBER LOGIN
</div>

<input id="username" placeholder="Player ID">
<input id="password" type="password" placeholder="Password">

<button class="loginBtn" onclick="login()">
LOGIN
</button>

<button class="regBtn" onclick="openRegisterBox()">
CREATE ACCOUNT
</button>

<div class="small">
Forgot password? Contact Customer Service
</div>

<div id="msg"></div>

</div>

<div id="registerBox" style="
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.85);
justify-content:center;
align-items:center;
z-index:9999;
">

<div style="
width:340px;
background:linear-gradient(180deg,#111,#000);
border:1px solid gold;
border-radius:18px;
padding:25px;
box-shadow:0 0 30px gold;
text-align:center;
">

<h1 style="color:gold;font-size:24px;">
CREATE ACCOUNT
</h1>

<input id="regUsername" placeholder="账号 4–20 位（英文/数字/符号） / ID 4–20 ตัว">

<input id="regPassword" type="password" placeholder="Password">

<input id="regConfirmPassword" type="password" placeholder="Confirm Password">

<input id="regRealName" placeholder="Real Name / ชื่อจริง">

<input id="regPhone" placeholder="Phone Number / เบอร์โทร">

<input id="regLineId" placeholder="LINE ID">

<input id="regBankName" placeholder="Bank Name / ธนาคาร">

<input id="regBankAccount" placeholder="Bank Account / เลขบัญชี">

<input id="regAgentCode" placeholder="Invite Code / Agent Code (optional)">
<button class="regBtn" onclick="register()">
CREATE NOW
</button>

<button onclick="closeRegisterBox()" style="
background:#333;
color:white;
">
CANCEL
</button>

<div id="regMsg" style="
margin-top:12px;
color:#ff8080;
min-height:20px;
font-size:14px;
"></div>

</div>
</div>

<script>
const urlParams =
new URLSearchParams(window.location.search);

const inviteAgent =
urlParams.get("agent");

if(inviteAgent){

localStorage.setItem(
"inviteAgent",
inviteAgent
);

}
async function login(){

const username =
document.getElementById("username").value.trim();

const password =
document.getElementById("password").value.trim();

/* 空白检查 */

if(
!username ||
!password
){

document.getElementById("msg").innerText =
"Please enter Player ID and Password";

return;

}

try{

const res =
await fetch(
"/member-login",
{
method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({
username,
password
})

}
);

const data =
await res.json();

if(data.success){

localStorage.setItem(
"userId",
data.userId
);

localStorage.setItem(
"name",
data.name
);

location.href =
"/home.html";

}else{

document.getElementById("msg").innerText =
data.msg ||
"Login failed";

}

}catch(err){

document.getElementById("msg").innerText =
"Network error";

}

}
  
async function register(){

const username =
document.getElementById("regUsername").value.trim();

const password =
document.getElementById("regPassword").value.trim();

const confirm =
document.getElementById("regConfirmPassword").value.trim();

const realName =
document.getElementById("regRealName").value.trim();

const phone =
document.getElementById("regPhone").value.trim();

const lineId =
document.getElementById("regLineId").value.trim();

const bankName =
document.getElementById("regBankName").value.trim();

const bankAccount =
document.getElementById("regBankAccount").value.trim();
  
const agentCode =
document.getElementById("regAgentCode").value.trim();

if(!username){

document.getElementById("regMsg").innerText =
"请输入玩家账号 / กรุณากรอก Player ID";

return;

}

if(username.length < 4 || username.length > 20){

document.getElementById("regMsg").innerText =
"玩家账号需 4–20 位 / Player ID ต้อง 4–20 ตัว";

return;

}

/* 不能全部都是符号，必须至少有英文或数字 */
if(!/[a-zA-Z0-9]/.test(username)){

document.getElementById("regMsg").innerText =
"账号至少包含英文或数字 / ต้องมีตัวอักษรหรือเลขอย่างน้อย 1 ตัว";

return;

}

if(!password){

document.getElementById("regMsg").innerText =
"请输入密码 / กรุณากรอกรหัสผ่าน";

return;

}

if(password.length < 4){

document.getElementById("regMsg").innerText =
"密码至少 4 位 / รหัสผ่านอย่างน้อย 4 ตัว";

return;

}

if(password.length > 30){

document.getElementById("regMsg").innerText =
"密码最多 30 位 / รหัสผ่านไม่เกิน 30 ตัว";

return;

}

if(/\s/.test(password)){

document.getElementById("regMsg").innerText =
"密码不能有空格 / รหัสผ่านห้ามมีช่องว่าง";

return;

}

if(
!realName ||
!phone ||
!bankName ||
!bankAccount
){

document.getElementById("regMsg").innerText =
"请填写姓名、电话、银行、账号 / กรุณากรอกชื่อ เบอร์ ธนาคาร เลขบัญชี";

return;

}

  
if(password!==confirm){

document.getElementById("regMsg").innerText=
"密码不一致 / รหัสผ่านไม่ตรงกัน";

return;

}

const res =
await fetch("/register",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({

username,
password,
realName,
phone,
lineId,
bankName,
bankAccount,
agentCode

})

});

const data =
await res.json();

document.getElementById("regMsg").innerText=
data.msg || "Account Created";

if(data.success){

document.getElementById("regMsg").innerText =
"Account Created Successfully...";

setTimeout(()=>{

document.getElementById("username").value =
username;

document.getElementById("password").value =
password;

closeRegisterBox();

login();

},1200);

}

}

function openRegisterBox(){

document.getElementById(
"registerBox"
).style.display="flex";

const savedAgent =
localStorage.getItem("inviteAgent");

if(savedAgent){

document.getElementById("regAgentCode").value =
savedAgent;

document.getElementById("regAgentCode").readOnly =
true;

}

}

function closeRegisterBox(){

document.getElementById(
"registerBox"
).style.display="none";

document.getElementById(
"regMsg"
).innerText="";

}


</script>

</body>
</html>
