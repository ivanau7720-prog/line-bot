<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width,initial-scale=1">

<title>Maintenance</title>

<style>

body{
margin:0;

min-height:100vh;

display:flex;

justify-content:center;

align-items:center;

font-family:sans-serif;

color:white;

background:

linear-gradient(
rgba(0,0,0,.35),
rgba(0,0,0,.92)
),

url("/lobby-bg.jpg");

background-size:cover;
background-position:center;
}

.box{

width:88%;
max-width:430px;

padding:36px 24px;

border-radius:30px;

background:
rgba(0,0,0,.72);

border:
1px solid gold;

box-shadow:
0 0 45px rgba(255,215,0,.22);

text-align:center;

backdrop-filter:
blur(20px);

}

.icon{

font-size:72px;

}

.title{

margin-top:14px;

font-size:28px;

color:gold;

font-weight:bold;

}

.text{

margin-top:18px;

font-size:15px;

line-height:2;

color:#ddd;

}

.time{

margin-top:18px;

padding:12px;

border-radius:16px;

background:
rgba(255,215,0,.12);

color:gold;

font-size:16px;

font-weight:bold;

}

.btn{

margin-top:22px;

width:100%;

height:58px;

border:none;

border-radius:18px;

background:

linear-gradient(
90deg,
gold,
orange
);

color:black;

font-size:17px;

font-weight:bold;

}

</style>

</head>

<body>

<div class="box">

<div class="icon">
🚧
</div>

<div class="title">
系统维护中
</div>

<div class="text">

正在升级系统功能

<br><br>

ระบบกำลังปรับปรุง

กรุณากลับมาใหม่ภายหลัง

</div>

<div class="time">

预计恢复：
Today 23:30

</div>

<button
class="btn"
onclick="location.href='/'">

🏠 返回首页

</button>

</div>

</body>

</html>
