<!DOCTYPE html>

<html>

<head>

<meta charset="UTF-8">

<title>Maintenance</title>

<style>

body{

margin:0;

height:100vh;

display:flex;

justify-content:center;

align-items:center;

background:

linear-gradient(
180deg,
#050505,
#141414
);

font-family:sans-serif;

color:white;

overflow:hidden;

}

.box{

text-align:center;

padding:50px;

max-width:700px;

}

.icon{

font-size:90px;

margin-bottom:20px;

animation:float 2s ease infinite;

}

@keyframes float{

0%{
transform:
translateY(0);
}

50%{
transform:
translateY(-8px);
}

100%{
transform:
translateY(0);
}

}

.title{

font-size:34px;

font-weight:bold;

color:#ffd700;

text-shadow:
0 0 20px gold;

}

.desc{

margin-top:28px;

font-size:20px;

line-height:2;

color:#cccccc;

}

.note{

margin-top:20px;

font-size:16px;

color:#888;

}

.btn{

display:inline-block;

margin-top:40px;

padding:16px 34px;

border-radius:18px;

background:

linear-gradient(
45deg,
#ffd700,
#ff9900
);

color:black;

text-decoration:none;

font-weight:bold;

}

</style>

</head>

<body>

<div class="box">

<div class="icon">

🛠️

</div>

<div class="title">

ระบบกำลังปรับปรุง

</div>

<div class="desc">

ขออภัยในความไม่สะดวก

<br><br>

ขณะนี้ระบบอยู่ระหว่างการปรับปรุง

เพื่อประสิทธิภาพที่ดียิ่งขึ้น

</div>

<div class="note">

โปรดลองใหม่ภายหลัง

</div>

<a
href="/"
class="btn"

>

รีเฟรชอีกครั้ง

</a>

</div>

</body>

</html>
