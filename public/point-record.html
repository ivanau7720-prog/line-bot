<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Point Record</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
min-height:100vh;
padding:20px 18px 40px;
font-family:sans-serif;
color:white;
background:
linear-gradient(rgba(0,0,0,.18),rgba(0,0,0,.85)),
url("/lobby-bg.jpg");
background-size:cover;
background-position:center top;
}

.langBox{
position:fixed;
top:18px;
right:18px;
z-index:10;
}

.langBox button{
background:rgba(0,0,0,.55);
color:gold;
border:1px solid rgba(255,215,0,.45);
border-radius:18px;
padding:8px 12px;
margin-left:6px;
}

.page{
margin-top:150px;
}

.title{
text-align:center;
color:gold;
font-size:26px;
font-weight:bold;
text-shadow:0 0 14px gold;
margin-bottom:20px;
}

.card{
margin-top:14px;
padding:16px;
border-radius:22px;
background:rgba(0,0,0,.6);
border:1px solid rgba(255,215,0,.28);
backdrop-filter:blur(18px);
box-shadow:0 0 28px rgba(255,215,0,.12);
}

.row{
display:flex;
justify-content:space-between;
gap:10px;
margin-top:8px;
font-size:14px;
}

.label{
color:#aaa;
}

.value{
color:white;
font-weight:bold;
text-align:right;
word-break:break-word;
}

.pointPlus{
color:gold;
font-size:22px;
font-weight:bold;
}

.pointMinus{
color:#ff4d4d;
font-size:22px;
font-weight:bold;
}

.empty{
margin-top:40px;
text-align:center;
color:#ccc;
font-size:16px;
}

.backBtn{
width:100%;
height:52px;
margin-top:20px;
border:none;
border-radius:16px;
background:rgba(255,215,0,.95);
color:black;
font-size:17px;
font-weight:bold;
}
</style>
</head>

<body>

<div class="langBox">
<button onclick="switchLang('zh')">中文</button>
<button onclick="switchLang('th')">ไทย</button>
</div>

<div class="page">

<div class="title" id="pageTitle">积分记录</div>

<div id="list"></div>

<button class="backBtn" onclick="location.href='/account.html'" id="backText">
← 返回账户
</button>

</div>

<script>
const LANG={
zh:{
pageTitle:"积分记录",
back:"← 返回账户",
type:"类型",
point:"积分",
note:"说明",
time:"时间",
rechargePoint:"充值奖励",
exchangePoint:"积分兑换",
adminAdjust:"后台调整",
empty:"暂无积分记录"
},
th:{
pageTitle:"ประวัติพอยท์",
back:"← กลับบัญชี",
type:"ประเภท",
point:"พอยท์",
note:"รายละเอียด",
time:"เวลา",
rechargePoint:"โบนัสเติมเงิน",
exchangePoint:"แลกของรางวัล",
adminAdjust:"ปรับโดยแอดมิน",
empty:"ยังไม่มีประวัติพอยท์"
}
};

function switchLang(lang){
localStorage.setItem("homeLang",lang);

const t=LANG[lang];

document.getElementById("pageTitle").innerText=t.pageTitle;
document.getElementById("backText").innerText=t.back;

loadRecords();
}

function typeText(type){
const lang=localStorage.getItem("homeLang") || "zh";
const t=LANG[lang];

if(type==="recharge_point") return t.rechargePoint;
if(type==="exchange_point") return t.exchangePoint;
if(type==="admin_point") return t.adminAdjust;

return type || "-";
}

async function loadRecords(){

const uid=localStorage.getItem("userId");

if(!uid){
location.href="/login.html";
return;
}

const lang=localStorage.getItem("homeLang") || "zh";
const t=LANG[lang];

const res=await fetch("/my-point-records/"+uid);
const data=await res.json();

const list=document.getElementById("list");
list.innerHTML="";

if(!data || data.length===0){
list.innerHTML=`<div class="empty">${t.empty}</div>`;
return;
}

data.forEach(r=>{

const point=Number(r.point || 0);
const pointClass=point >= 0 ? "pointPlus" : "pointMinus";
const pointText=point >= 0 ? "+"+point : point;

const time=r.created_at
? new Date(r.created_at).toLocaleString()
: "-";

const card=document.createElement("div");
card.className="card";

card.innerHTML=`
<div class="row">
<div class="label">${t.point}</div>
<div class="value ${pointClass}">${pointText}</div>
</div>

<div class="row">
<div class="label">${t.type}</div>
<div class="value">${typeText(r.type)}</div>
</div>

<div class="row">
<div class="label">${t.note}</div>
<div class="value">${r.note || "-"}</div>
</div>

<div class="row">
<div class="label">${t.time}</div>
<div class="value">${time}</div>
</div>
`;

list.appendChild(card);

});

}

switchLang(localStorage.getItem("homeLang") || "zh");
</script>

</body>
</html>
