<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Points Mall</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
min-height:100vh;
font-family:sans-serif;
color:white;
padding:20px 16px 50px;

background:
linear-gradient(
rgba(0,5,20,.35),
rgba(0,0,0,.88)
),
url("/shop-bg.jpg");

background-size:cover;
background-position:center top;
background-attachment:fixed;
}

.langBox{
position:fixed;
top:18px;
right:18px;
z-index:20;
}

.langBox button{
background:rgba(0,0,0,.55);
color:gold;
border:1px solid rgba(255,215,0,.45);
border-radius:18px;
padding:8px 12px;
margin-left:6px;
}

.page{
margin-top:150px;
}

.header{
text-align:center;
margin-bottom:18px;
}

.title{
font-size:28px;
font-weight:bold;
color:gold;
text-shadow:0 0 16px gold;
}

.subTitle{
font-size:14px;
color:#cfd9ff;
margin-top:8px;
}

.pointBox{
margin-top:18px;
padding:18px;
border-radius:24px;
background:rgba(0,20,50,.62);
border:1px solid rgba(255,215,0,.35);
backdrop-filter:blur(18px);
box-shadow:0 0 30px rgba(0,150,255,.18);
text-align:center;
}

.pointLabel{
font-size:13px;
color:#b8c7ff;
}

.pointValue{
font-size:34px;
font-weight:bold;
color:gold;
margin-top:6px;
text-shadow:0 0 14px gold;
}

.sectionTitle{
margin-top:24px;
margin-bottom:12px;
font-size:19px;
font-weight:bold;
color:gold;
text-shadow:0 0 10px rgba(255,215,0,.5);
}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:14px;
}

.item{
padding:14px;
border-radius:22px;
background:rgba(0,18,45,.68);
border:1px solid rgba(0,180,255,.35);
box-shadow:0 0 22px rgba(0,180,255,.12);
backdrop-filter:blur(16px);
text-align:center;
}

.icon{
font-size:38px;
margin-bottom:8px;
filter:drop-shadow(0 0 10px rgba(0,180,255,.8));
}
.product-img{
width:110px;
height:110px;
object-fit:contain;
border-radius:0;
margin-bottom:10px;
filter:drop-shadow(0 0 18px rgba(255,215,0,.75));
}
.itemName{
font-size:15px;
font-weight:bold;
min-height:38px;
}

.cost{
margin-top:8px;
font-size:15px;
color:gold;
font-weight:bold;
}

.desc{
margin-top:6px;
font-size:12px;
color:#c9d4ff;
min-height:32px;
line-height:1.35;
}

.rule{
margin-top:6px;
font-size:11px;
color:#9fb3ff;
min-height:28px;
line-height:1.35;
}

.exchangeBtn{
width:100%;
height:42px;
margin-top:12px;
border:none;
border-radius:14px;
background:linear-gradient(90deg,#ffd700,#ffb300);
color:black;
font-size:15px;
font-weight:bold;
box-shadow:0 0 16px rgba(255,215,0,.35);
}

.exchangeBtn:active{
transform:scale(.97);
}

.backBtn{
width:100%;
height:52px;
margin-top:24px;
border:none;
border-radius:18px;
background:rgba(0,0,0,.65);
color:gold;
border:1px solid rgba(255,215,0,.4);
font-size:17px;
font-weight:bold;
}

@media(max-width:360px){
.grid{
gap:10px;
}
.item{
padding:12px 10px;
}
.itemName{
font-size:14px;
}
}
</style>
</head>

<body>

<div class="langBox">
<button onclick="switchLang('zh')">中文</button>
<button onclick="switchLang('th')">ไทย</button>
</div>

<div class="page">

<div class="header">
<div class="title" id="pageTitle">积分商城</div>
<div class="subTitle" id="pageSubTitle">使用积分兑换奖励与豪华礼品</div>
</div>

<div class="pointBox">
<div class="pointLabel" id="myPointLabel">我的积分</div>
<div class="pointValue" id="pointValue">0</div>
</div>

<div class="sectionTitle" id="bonusTitle">🎁 Bonus 兑换区</div>
<div class="grid" id="bonusGrid"></div>

<div class="sectionTitle" id="luxuryTitle">👑 豪华礼品区</div>
<div class="grid" id="luxuryGrid"></div>

<button class="backBtn" onclick="location.href='/account.html'" id="backText">
返回账户
</button>

</div>

},

}
];

function switchLang(lang){

currentLang=lang;
localStorage.setItem("homeLang",lang);

const t=LANG[lang];

document.getElementById("pageTitle").innerText=t.pageTitle;
document.getElementById("pageSubTitle").innerText=t.pageSubTitle;
document.getElementById("myPointLabel").innerText=t.myPoint;
document.getElementById("bonusTitle").innerText=t.bonusTitle;
document.getElementById("luxuryTitle").innerText=t.luxuryTitle;
document.getElementById("backText").innerText=t.back;

renderItems();

}

async function loadPoint(){

const uid=localStorage.getItem("userId");

if(!uid){
location.href="/login.html";
return;
}

const res=await fetch("/balance/"+uid);
const d=await res.json();

myPoint=Number(d.point || 0);

document.getElementById("pointValue").innerText=
myPoint.toLocaleString();

}

function renderItems(){

renderGroup("bonusGrid",bonusItems);
renderGroup("luxuryGrid",luxuryItems);

}

function renderGroup(boxId,items){

const box=document.getElementById(boxId);
const t=LANG[currentLang];

box.innerHTML="";

items.forEach(item=>{

const name=currentLang==="zh" ? item.nameZh : item.nameTh;
const desc=currentLang==="zh" ? item.descZh : item.descTh;
const rule=currentLang==="zh" ? item.ruleZh : item.ruleTh;

const card=document.createElement("div");
card.className="item";

card.innerHTML=`
${item.img ? `<img class="product-img" src="${item.img}">` : `<div class="icon">${item.icon}</div>`}
<div class="itemName">${name}</div>
<div class="cost">${item.cost.toLocaleString()} ${t.point}</div>
<div class="desc">${desc}</div>
<div class="rule">${rule}</div>
<button class="exchangeBtn" onclick="exchangeItem('${name}',${item.cost})">${t.exchange}</button>
`;

box.appendChild(card);

});

}

async function exchangeItem(itemName,cost){

const t=LANG[currentLang];

if(myPoint < cost){
alert(t.notEnough);
return;
}

if(!confirm(itemName+" ต้องการแลกใช้ "+cost+" Point ?")){
return;
}

const uid=localStorage.getItem("userId");

const res=await fetch("/exchange",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
userId:uid,
itemName:itemName,
cost:cost
})
});

const d=await res.json();

alert(d.msg || "Success");

if(d.success){
await loadPoint();
renderItems();
}

}

loadPoint();
switchLang(currentLang);
</script>

</html>
