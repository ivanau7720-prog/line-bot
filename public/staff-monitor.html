<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>SIAMBET88 STAFF MONITOR</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
*{
  box-sizing:border-box;
}

html,body{
  margin:0;
  width:100%;
  height:100%;
  overflow:hidden;

  background:
    radial-gradient(circle at 20% 20%, rgba(255,215,0,.08), transparent 25%),
    radial-gradient(circle at 80% 30%, rgba(0,180,255,.10), transparent 25%),
    radial-gradient(circle at 50% 90%, rgba(255,215,0,.06), transparent 35%),
    linear-gradient(135deg,#01040d 0%,#04142d 30%,#071d3f 60%,#01040d 100%);

  color:white;
  font-family:Arial,sans-serif;
}
body::before{
  content:"";
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  pointer-events:none;
  z-index:0;

  background:
    linear-gradient(rgba(255,255,255,0.025) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,0.025) 1px, transparent 1px);

  background-size:42px 42px;
}
body::after{
  content:"♠ ♥ ♣ ♦";

  position:fixed;

  top:50%;
  left:50%;

  transform:
    translate(-50%,-50%);

  font-size:180px;

  font-weight:bold;

  letter-spacing:60px;

 color:rgba(255,215,0,.08);

  pointer-events:none;

  z-index:0;
}
.glow-ring{
  position:fixed;

  top:50%;
  left:50%;

  width:700px;
  height:700px;

  transform:translate(-50%,-50%);

  border-radius:50%;

  background:
  radial-gradient(
    circle,
    rgba(255,215,0,.12),
    transparent 70%
  );

  pointer-events:none;

  z-index:0;
}
  
body{
  padding:10px;
  position:relative;
}
.topbar,
#loginBox,
#monitorBox{
  position:relative;
  z-index:1;
}
.topbar{
  height:55px;
  display:flex;
  align-items:center;
  justify-content:space-between;
}

h1{
  margin:0;

  color:#ffd700;

  font-size:42px;

  text-align:center;

  flex:1;

  letter-spacing:2px;

  text-shadow:
    0 0 10px rgba(255,215,0,.9),
    0 0 20px rgba(255,215,0,.5),
    0 0 35px rgba(255,215,0,.2);
}

.langBtn{
  width:80px;
  height:38px;
  border:none;
  border-radius:10px;
  font-weight:bold;
  font-size:16px;
  cursor:pointer;
}

#loginBox{
  margin-top:120px;
  text-align:center;

  background:rgba(5,10,25,.75);

border:1px solid rgba(255,215,0,.45);

box-shadow:
0 0 20px rgba(255,215,0,.15),
0 0 40px rgba(255,215,0,.08);

backdrop-filter:blur(12px);
  backdrop-filter:blur(10px);

  width:520px;
  margin-left:auto;
  margin-right:auto;

  padding:40px;
  border-radius:20px;
}

#adminPass{
  font-size:26px;
  padding:12px;
  border-radius:10px;
  border:none;
}

.loginBtn{
  margin-top:15px;
  padding:12px 30px;
  font-size:20px;
  border:none;
  border-radius:10px;
  cursor:pointer;
  font-weight:bold;
}

.dashboard{
  display:grid;
  grid-template-columns:1.2fr 1fr;
  gap:12px;
  height:calc(100vh - 70px);
}

.left{
  display:grid;
  grid-template-rows:1fr 1fr 1fr;
  gap:12px;
}

.grid3{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:12px;
}

.card{
  background:
linear-gradient(
  180deg,
  rgba(20,30,55,.95),
  rgba(10,15,30,.95)
);
  border:1px solid rgba(255,215,0,.35);
  border-radius:16px;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  box-shadow:
0 0 12px rgba(255,215,0,.18),
0 0 30px rgba(255,215,0,.05);
  min-height:120px;
}

.title{
  font-size:22px;
  font-weight:bold;
  margin-bottom:8px;
}

.value{
  font-size:52px;
  font-weight:bold;
  line-height:1;
}

.smallValue{
  font-size:44px;
  font-weight:bold;
}

.green{color:#00ff88;}
.red{color:#ff4444;}
.blue{color:#3399ff;}
.gold{color:gold;}
.white{color:white;}

.right{
  display:grid;
  grid-template-rows:1.3fr .7fr .7fr;
  gap:12px;
}

.alert{
  background:#111827;
  border:2px solid gold;
  border-radius:18px;
  padding:18px;
  display:flex;
  flex-direction:column;
  justify-content:center;
}

.alert h2{
  color:gold;
  font-size:30px;
  text-align:center;
  margin:0 0 16px 0;
}

.profitRow{
  display:flex;
  justify-content:space-between;
  align-items:center;
  font-size:34px;
  font-weight:bold;
  padding:10px 0;
  border-bottom:1px solid #333;
}

.bestBox{
  background:linear-gradient(135deg,#1a1200,#3a2a00,#111827);
  border:2px solid gold;
  border-radius:18px;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  text-align:center;
}

.bestTitle{
  color:gold;
  font-size:26px;
  font-weight:bold;
}

.bestSide{
  font-size:48px;
  font-weight:bold;
  margin-top:8px;
}

.statusBox{
  background:#111827;
  border:1px solid rgba(255,215,0,.35);
  border-radius:18px;
  display:grid;
  grid-template-columns:1fr 1fr 1fr;
  align-items:center;
  text-align:center;
  gap:10px;
  padding:10px;
}

.statusItem{
  font-size:28px;
  font-weight:bold;
}

@media(max-width:900px){
  html,body{
    overflow:auto;
  }

  .dashboard{
    display:block;
    height:auto;
  }

  .left,.right,.grid3{
    display:block;
  }

  .card,.alert,.bestBox,.statusBox{
    margin-bottom:12px;
    min-height:120px;
  }

  .statusBox{
    display:block;
  }

  h1{
    font-size:24px;
  }
}
</style>
</head>

<body>

<div class="glow-ring"></div>

<div class="topbar">
  <button class="langBtn" onclick="switchLang('zh')">中文</button>
  <h1>👑 SIAMBET88 CONTROL CENTER</h1>
  <button class="langBtn" onclick="switchLang('th')">ไทย</button>
</div>

<div id="loginBox">
  <h2>请输入管理员密码</h2>
  <input id="adminPass" type="password" placeholder="Admin Password">
  <br>
  <button class="loginBtn" onclick="loginMonitor()">进入 Monitor</button>
</div>

<div id="monitorBox" style="display:none;">

  <div class="dashboard">

    <div class="left">

      <div class="grid3">
        <div class="card">
          <div class="title" id="tOnline">🟢 在线会员</div>
          <div class="value green" id="online">0</div>
        </div>

        <div class="card">
          <div class="title" id="tWatching">👀 观看直播</div>
          <div class="value blue" id="watching">0</div>
        </div>

        <div class="card">
          <div class="title" id="tBetUsers">🎯 本局下注</div>
          <div class="value gold" id="totalBetUsers">0</div>
        </div>
      </div>

      <div class="grid3">
        <div class="card">
          <div class="title red">🔴 BANKER</div>
          <div class="value red" id="bankerUsers">0</div>
        </div>

        <div class="card">
          <div class="title blue">🔵 PLAYER</div>
          <div class="value blue" id="playerUsers">0</div>
        </div>

        <div class="card">
          <div class="title green">🟢 TIE</div>
          <div class="value green" id="tieUsers">0</div>
        </div>
      </div>

      <div class="grid3">
        <div class="card">
          <div class="title">💰 BANKER</div>
          <div class="smallValue gold" id="bankerAmount">฿0</div>
        </div>

        <div class="card">
          <div class="title">💰 PLAYER</div>
          <div class="smallValue gold" id="playerAmount">฿0</div>
        </div>

        <div class="card">
          <div class="title">💰 TIE</div>
          <div class="smallValue gold" id="tieAmount">฿0</div>
        </div>
      </div>

    </div>

    <div class="right">

      <div class="alert">
        <h2 id="tProfit">🔔 平台盈利预测</h2>

        <div class="profitRow">
          <span>BANKER</span>
          <span id="profitBanker">฿0</span>
        </div>

        <div class="profitRow">
          <span>PLAYER</span>
          <span id="profitPlayer">฿0</span>
        </div>

        <div class="profitRow">
          <span>TIE</span>
          <span id="profitTie">฿0</span>
        </div>
      </div>

      <div class="bestBox">
        <div class="bestTitle" id="tBest">🔥 建议结果</div>
        <div class="bestSide" id="bestSide">-</div>
      </div>

      <div class="statusBox">
        <div class="statusItem" id="round">🎯 #0</div>
        <div class="statusItem" id="timeLeft">⏱ 0s</div>
        <div class="statusItem" id="betStatus">🔴 停止下注</div>
      </div>

    </div>

  </div>

</div>

<script>
let adminToken = "";
let lang = "zh";

function switchLang(l){
  lang = l;
  applyLang();
}

function applyLang(){
  if(lang === "zh"){
    document.getElementById("tOnline").innerText = "🟢 在线会员";
    document.getElementById("tWatching").innerText = "👀 观看直播";
    document.getElementById("tBetUsers").innerText = "🎯 本局下注";
    document.getElementById("tProfit").innerText = "🔔 平台盈利预测";
    document.getElementById("tBest").innerText = "🔥 建议结果";
  }else{
    document.getElementById("tOnline").innerText = "🟢 สมาชิกออนไลน์";
    document.getElementById("tWatching").innerText = "👀 กำลังดูไลฟ์";
    document.getElementById("tBetUsers").innerText = "🎯 ผู้เดิมพันรอบนี้";
    document.getElementById("tProfit").innerText = "🔔 คาดการณ์กำไร";
    document.getElementById("tBest").innerText = "🔥 ผลที่แนะนำ";
  }
}

async function loginMonitor(){
  const password = document.getElementById("adminPass").value;

  const res = await fetch("/admin-login",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({password})
  });

  const data = await res.json();

  if(!data.success){
    alert(lang === "zh" ? "密码错误" : "รหัสผ่านไม่ถูกต้อง");
    return;
  }

  adminToken = data.token;

  document.getElementById("loginBox").style.display = "none";
  document.getElementById("monitorBox").style.display = "block";

  loadMonitor();
  setInterval(loadMonitor,2000);
}

function money(n){
  n = Number(n || 0);
  const sign = n >= 0 ? "+" : "-";
  return sign + "฿" + Math.abs(Math.round(n)).toLocaleString();
}

function amount(n){
  return "฿" + Number(n || 0).toLocaleString();
}

function setProfit(id,value){
  const el = document.getElementById(id);
  el.innerText = money(value);
  el.style.color = Number(value) >= 0 ? "#00ff88" : "#ff4444";
}

function updateBest(d){
  const list = [
    {side:"BANKER", profit:Number(d.profitIfBanker || 0)},
    {side:"PLAYER", profit:Number(d.profitIfPlayer || 0)},
    {side:"TIE", profit:Number(d.profitIfTie || 0)}
  ];

  list.sort((a,b)=>b.profit - a.profit);

  const best = list[0];
  const el = document.getElementById("bestSide");

  el.innerText = best.side + "  " + money(best.profit);

  if(best.profit >= 0){
    el.style.color = "#00ff88";
  }else{
    el.style.color = "#ff4444";
  }
}

async function loadMonitor(){
  const res = await fetch("/admin/monitor-data",{
    headers:{
      "x-admin-token": adminToken
    }
  });

  const d = await res.json();

  document.getElementById("online").innerText = d.online || 0;
  document.getElementById("watching").innerText = d.watching || 0;
  document.getElementById("totalBetUsers").innerText = d.totalBetUsers || 0;

  document.getElementById("bankerUsers").innerText = d.bankerUsers || 0;
  document.getElementById("playerUsers").innerText = d.playerUsers || 0;
  document.getElementById("tieUsers").innerText = d.tieUsers || 0;

  document.getElementById("bankerAmount").innerText = amount(d.bankerAmount);
  document.getElementById("playerAmount").innerText = amount(d.playerAmount);
  document.getElementById("tieAmount").innerText = amount(d.tieAmount);

  setProfit("profitBanker", d.profitIfBanker);
  setProfit("profitPlayer", d.profitIfPlayer);
  setProfit("profitTie", d.profitIfTie);

  updateBest(d);

  document.getElementById("round").innerText = "🎯 ROUND #" + (d.round || 0);
  document.getElementById("timeLeft").innerText =
    "⏱ " + (d.timeLeft || 0) + (lang === "zh" ? " 秒" : " วิ");

  document.getElementById("betStatus").innerText =
    d.isBetting
    ? (lang === "zh" ? "🟢 开放下注" : "🟢 เปิดรับเดิมพัน")
    : (lang === "zh" ? "🔴 停止下注" : "🔴 ปิดรับเดิมพัน");
}

applyLang();
</script>

</body>
</html>
