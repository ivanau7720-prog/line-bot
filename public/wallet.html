<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width,initial-scale=1">

<title>Wallet</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{

min-height:100vh;

background:

linear-gradient(
rgba(0,0,0,.2),
rgba(0,0,0,.8)
),

url("/lobby-bg.jpg");

background-size:cover;

background-position:center top;

color:white;

font-family:sans-serif;

padding:20px;

}

.title{

font-size:28px;

color:gold;

text-align:center;

margin-top:170px;

margin-bottom:22px;

}

.tab{

display:flex;

gap:12px;

margin-bottom:18px;

}

.btn{

flex:1;

height:52px;

border:none;

border-radius:18px;

background:

rgba(
0,
0,
0,
.55
);

color:gold;

font-size:20px;

}

.active{

border:

1px solid gold;

box-shadow:

0 0 30px gold;

}

.box{

padding:24px;

margin-top:10px;

border-radius:24px;

background:

rgba(
0,
0,
0,
.58
);

backdrop-filter:
blur(20px);

}

.input{

width:100%;

height:60px;

margin-top:12px;

padding:16px;

background:

rgba(
255,
255,
255,
.08
);

border:

1px solid
rgba(
255,
215,
0,
.35
);

border-radius:18px;

color:white;

}

.submit{

margin-top:20px;

width:100%;

height:65px;

border:none;

border-radius:20px;

background:gold;

color:black;

font-size:20px;

font-weight:bold;

}

.small{

margin-top:18px;

color:#ddd;

text-align:center;

}

</style>

</head>

<body>

<div class="title">

💰 Wallet

</div>

<div class="tab">

<button
class="btn active"
id="depositBtn">

充值

</button>

<button
class="btn"
id="withdrawBtn">

提款

</button>

</div>

<div class="box">

<input
class="input"
placeholder="输入金额">

<input
class="input"
placeholder="姓名">

<button
class="submit">

提交申请

</button>

<div class="small">

审核后自动到账

</div>

</div>

</body>

</html>
