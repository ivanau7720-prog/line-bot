<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width,initial-scale=1">

<title>Wallet</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{

min-height:100vh;

background:

linear-gradient(
rgba(0,0,0,.2),
rgba(0,0,0,.8)
),

url("/lobby-bg.jpg");

background-size:cover;

background-position:center top;

color:white;

font-family:sans-serif;

padding:20px;

}

.title{

font-size:28px;

color:gold;

text-align:center;

margin-top:170px;

margin-bottom:22px;

}

.tab{

display:flex;

gap:12px;

margin-bottom:18px;

}

.btn{

flex:1;

height:52px;

border:none;

border-radius:18px;

background:

rgba(
0,
0,
0,
.55
);

color:gold;

font-size:20px;

}

.active{

border:

1px solid gold;

box-shadow:

0 0 30px gold;

}

.box{

padding:24px;

margin-top:10px;

border-radius:24px;

background:

rgba(
0,
0,
0,
.58
);

backdrop-filter:
blur(20px);

}

.input{

width:100%;

height:60px;

margin-top:12px;

padding:16px;

background:

rgba(
255,
255,
255,
.08
);

border:

1px solid
rgba(
255,
215,
0,
.35
);

border-radius:18px;

color:white;

}

.submit{

margin-top:20px;

width:100%;

height:65px;

border:none;

border-radius:20px;

background:gold;

color:black;

font-size:20px;

font-weight:bold;

}

.small{

margin-top:18px;

color:#ddd;

text-align:center;

}

</style>

</head>

<body>

<div class="title">

💰 Wallet

</div>

<div class="tab">

<button
class="btn active"
id="depositBtn">

充值

</button>

<button
class="btn"
id="withdrawBtn">

提款

</button>

</div>

<div class="box" id="formBox">

</div>

<script>

const depositBtn =
document.getElementById("depositBtn");

const withdrawBtn =
document.getElementById("withdrawBtn");

const formBox =
document.getElementById("formBox");

let currentType = "deposit";

function showDeposit(){

currentType = "deposit";

depositBtn.classList.add("active");
withdrawBtn.classList.remove("active");

formBox.innerHTML = `

<input
class="input"
id="amount"
type="number"
placeholder="输入充值金额">

<input
class="input"
id="method"
placeholder="转账方式 / 银行 / 钱包">

<input
class="input"
id="payerName"
placeholder="付款人姓名">

<input
class="input"
id="receipt"
placeholder="截图链接 / 图片URL">

<button
class="submit"
onclick="submitWallet()">

提交充值

</button>

<div class="small">

审核后自动到账

</div>

`;

}

function showWithdraw(){

currentType = "withdraw";

withdrawBtn.classList.add("active");
depositBtn.classList.remove("active");

formBox.innerHTML = `

<input
class="input"
id="amount"
type="number"
placeholder="输入提款金额">

<input
class="input"
id="bankName"
placeholder="银行名称">

<input
class="input"
id="bankAccount"
placeholder="银行账号">

<input
class="input"
id="receiverName"
placeholder="收款人姓名">

<button
class="submit"
onclick="submitWallet()">

提交提款

</button>

<div class="small">

请确认账户资料正确

</div>

`;

}

function submitWallet(){

let data = {};

if(currentType==="deposit"){

data = {

type:"deposit",

amount:
document.getElementById(
"amount"
).value,

method:
document.getElementById(
"method"
).value,

payerName:
document.getElementById(
"payerName"
).value,

receipt:
document.getElementById(
"receipt"
).value

};

}else{

data = {

type:"withdraw",

amount:
document.getElementById(
"amount"
).value,

bankName:
document.getElementById(
"bankName"
).value,

bankAccount:
document.getElementById(
"bankAccount"
).value,

receiverName:
document.getElementById(
"receiverName"
).value

};

}

console.log(data);

alert(
JSON.stringify(
data,
null,
2
)
);

}

depositBtn.onclick = showDeposit;
withdrawBtn.onclick = showWithdraw;

const params =
new URLSearchParams(window.location.search);

if(params.get("tab") === "withdraw"){
showWithdraw();
}else{
showDeposit();
}

</script>
  
</body>

</html>
