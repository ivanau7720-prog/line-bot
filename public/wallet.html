<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width,initial-scale=1">

<title>Wallet</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{

min-height:100vh;

background:

linear-gradient(
rgba(0,0,0,.2),
rgba(0,0,0,.8)
),

url("/lobby-bg.jpg");

background-size:cover;

background-position:center top;

color:white;

font-family:sans-serif;

padding:20px;

}
.langBox{

position:fixed;

top:18px;

right:18px;

z-index:10;

}

.langBox button{

background:
rgba(
0,
0,
0,
.55
);

color:gold;

border:

1px solid
rgba(
255,
215,
0,
.35
);

border-radius:18px;

padding:8px 12px;

margin-left:6px;

}
.title{

font-size:28px;

color:gold;

text-align:center;

margin-top:170px;

margin-bottom:22px;

}

.tab{

display:flex;

gap:12px;

margin-bottom:18px;

}

.btn{

flex:1;

height:52px;

border:none;

border-radius:18px;

background:

rgba(
0,
0,
0,
.55
);

color:gold;

font-size:20px;

}

.active{

border:

1px solid gold;

box-shadow:

0 0 30px gold;

}

.box{

padding:24px;

margin-top:10px;

border-radius:24px;

background:

rgba(
0,
0,
0,
.58
);

backdrop-filter:
blur(20px);

}

.input{

width:100%;

height:60px;

margin-top:12px;

padding:16px;

background:

rgba(
255,
255,
255,
.08
);

border:

1px solid
rgba(
255,
215,
0,
.35
);

border-radius:18px;

color:white;

}

.submit{

margin-top:20px;

width:100%;

height:65px;

border:none;

border-radius:20px;

background:gold;

color:black;

font-size:20px;

font-weight:bold;

}

.small{

margin-top:18px;

color:#ddd;

text-align:center;

}

</style>

</head>

<body>

<div class="langBox">

<button onclick="switchLang('zh')">
中文
</button>

<button onclick="switchLang('th')">
ไทย
</button>

</div>

<div class="title">

💰 Wallet

</div>

<div class="tab">

<button
class="btn active"
id="depositBtn">

充值

</button>

<button
class="btn"
id="withdrawBtn">

提款

</button>

</div>

<div class="box" id="formBox">

</div>

<script>

const depositBtn =
document.getElementById("depositBtn");

const withdrawBtn =
document.getElementById("withdrawBtn");

const formBox =
document.getElementById("formBox");

let currentType = "deposit";
let currentLang =
localStorage.getItem("homeLang") || "zh";

const WALLET_LANG = {

zh:{
title:"💰 Wallet",
deposit:"充值",
withdraw:"提款",

depositAmount:"输入充值金额",
depositMethod:"转账方式 / 银行 / 钱包",
payerName:"付款人姓名",
receipt:"截图链接 / 图片URL",
submitDeposit:"提交充值",
depositSmall:"审核后自动到账",

withdrawAmount:"输入提款金额",
bankName:"银行名称",
bankAccount:"银行账号",
receiverName:"收款人姓名",
submitWithdraw:"提交提款",
withdrawSmall:"请确认账户资料正确"
},

th:{
title:"💰 กระเป๋า",
deposit:"เติมเงิน",
withdraw:"ถอนเงิน",

depositAmount:"กรอกจำนวนเงินที่เติม",
depositMethod:"ช่องทางโอน / ธนาคาร / วอลเล็ต",
payerName:"ชื่อผู้โอนเงิน",
receipt:"ลิงก์สลิป / URL รูปภาพ",
submitDeposit:"ส่งคำขอเติมเงิน",
depositSmall:"ระบบจะเติมยอดหลังแอดมินตรวจสอบ",

withdrawAmount:"กรอกจำนวนเงินที่ถอน",
bankName:"ชื่อธนาคาร",
bankAccount:"เลขบัญชีธนาคาร",
receiverName:"ชื่อเจ้าของบัญชี",
submitWithdraw:"ส่งคำขอถอนเงิน",
withdrawSmall:"กรุณาตรวจสอบข้อมูลบัญชีให้ถูกต้อง"
}

};

function applyLang(){

const t = WALLET_LANG[currentLang];

document.querySelector(".title").innerText = t.title;
depositBtn.innerText = t.deposit;
withdrawBtn.innerText = t.withdraw;

}

function showDeposit(){

currentType = "deposit";

applyLang();

const t = WALLET_LANG[currentLang];

depositBtn.classList.add("active");
withdrawBtn.classList.remove("active");

formBox.innerHTML = `

<input class="input" id="amount" type="number" placeholder="${t.depositAmount}">

<input class="input" id="method" placeholder="${t.depositMethod}">

<input class="input" id="payerName" placeholder="${t.payerName}">

<input class="input" id="receipt" placeholder="${t.receipt}">

<button class="submit" onclick="submitWallet()">
${t.submitDeposit}
</button>

<div class="small">
${t.depositSmall}
</div>

`;

}

function showWithdraw(){

currentType = "withdraw";

applyLang();

const t = WALLET_LANG[currentLang];

withdrawBtn.classList.add("active");
depositBtn.classList.remove("active");

formBox.innerHTML = `

<input class="input" id="amount" type="number" placeholder="${t.withdrawAmount}">

<input class="input" id="bankName" placeholder="${t.bankName}">

<input class="input" id="bankAccount" placeholder="${t.bankAccount}">

<input class="input" id="receiverName" placeholder="${t.receiverName}">

<button class="submit" onclick="submitWallet()">
${t.submitWithdraw}
</button>

<div class="small">
${t.withdrawSmall}
</div>

`;

}

function switchLang(lang){

currentLang = lang;

localStorage.setItem("homeLang", lang);

if(currentType === "withdraw"){
showWithdraw();
}else{
showDeposit();
}

}

function submitWallet(){

const amount =
document.getElementById("amount").value;

if(!amount || Number(amount) <= 0){

alert(
currentLang === "th"
? "กรุณากรอกจำนวนเงิน"
: "请输入金额"
);

return;

}

if(currentType === "deposit"){

const method =
document.getElementById("method").value;

const payerName =
document.getElementById("payerName").value;

if(!method || !payerName){

alert(
currentLang === "th"
? "กรุณากรอกช่องทางโอนและชื่อผู้โอน"
: "请输入转账方式和付款人姓名"
);

return;

}

alert(
currentLang === "th"
? "ส่งคำขอเติมเงินสำเร็จ รอแอดมินตรวจสอบ"
: "充值申请已提交，等待后台审核"
);

}else{

const bankName =
document.getElementById("bankName").value;

const bankAccount =
document.getElementById("bankAccount").value;

const receiverName =
document.getElementById("receiverName").value;

if(!bankName || !bankAccount || !receiverName){

alert(
currentLang === "th"
? "กรุณากรอกข้อมูลบัญชีให้ครบ"
: "请输入完整银行资料"
);

return;

}

alert(
currentLang === "th"
? "ส่งคำขอถอนเงินสำเร็จ รอแอดมินตรวจสอบ"
: "提款申请已提交，等待后台审核"
);

}

}

depositBtn.onclick = showDeposit;
withdrawBtn.onclick = showWithdraw;

const params =
new URLSearchParams(window.location.search);

if(params.get("tab") === "withdraw"){
showWithdraw();
}else{
showDeposit();
}

</script>
  
</body>

</html>
